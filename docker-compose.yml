services:
  ubiquitistorelurker:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    image: ubiquitistorelurker:latest
    container_name: ubiquitistorelurker
    restart: unless-stopped
    networks:
      proxy:
        ipv4_address: 172.18.2.4
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__ubiquitistorelurker-db=Data Source=/data/ubiquitistorelurker.db
      # OTLP → Collector (single endpoint; Collector fans out to Prometheus + Aspire Dashboard)
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://ubiquitistorelurker-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    volumes:
      - /devpool/docker-volumes/apps/ubiquitistorelurker/data:/data
      - /devpool/docker-volumes/apps/ubiquitistorelurker/logs:/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ubiquitistorelurker.rule=Host(`ubiquitistorelurker.rverbist.io`)"
      - "traefik.http.routers.ubiquitistorelurker.entrypoints=websecure"
      - "traefik.http.routers.ubiquitistorelurker.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ubiquitistorelurker.middlewares=lan-only@file"
      - "traefik.http.services.ubiquitistorelurker.loadbalancer.server.port=8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/health/ready",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.2
    container_name: aspire-dashboard
    restart: unless-stopped
    networks:
      proxy:
        ipv4_address: 172.18.2.5
    environment:
      - DASHBOARD__FRONTEND__AUTHMODE=Unsecured
      - DASHBOARD__OTLP__AUTHMODE=Unsecured
      - DOTNET_DASHBOARD_OTLP_ENDPOINT_URL=http://+:18889
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ubiquitistorelurker-aspire.rule=Host(`aspire.ubiquitistorelurker.rverbist.io`)"
      - "traefik.http.routers.ubiquitistorelurker-aspire.entrypoints=websecure"
      - "traefik.http.routers.ubiquitistorelurker-aspire.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ubiquitistorelurker-aspire.middlewares=lan-only@file"
      - "traefik.http.services.ubiquitistorelurker-aspire.loadbalancer.server.port=18888"

  # OTel Collector — receives OTLP from the app (single endpoint) and fans out:
  #   metrics → Prometheus remote-write → lab Prometheus (172.18.1.1)
  #   traces  → OTLP gRPC → Aspire Dashboard (172.18.2.5:18889)
  # Requires --web.enable-remote-write-receiver on the lab Prometheus container.
  ubiquitistorelurker-otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ubiquitistorelurker-otel-collector
    restart: unless-stopped
    networks:
      proxy:
        ipv4_address: 172.18.2.6
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]

networks:
  proxy:
    external: true
