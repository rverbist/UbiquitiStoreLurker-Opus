# ─── Open Questions (optional) ───────────────────────────────────────────

# open_questions:   # Optional — include when research leaves material open questions.
#   - '<Unresolved question>'  # See spec for field definition.
# Note: gem-researcher mode marks this as REQUIRED; the skill spec marks it as Optional.
# Include when relevant; omit only when no material open questions remain.
