  - topic: "'In Stock' Popup — Full Celebration Sequence"
    summary: "Orchestrated GSAP timeline + canvas-confetti for a maximally bombastic 'in stock' notification."
    details: |
      **Celebration sequence (triggered when stock changes to 'available')**:
      ```typescript
      import gsap from 'gsap'
      import confetti from 'canvas-confetti'

      function celebrateInStock(popupEl: HTMLElement, productName: string) {
        const tl = gsap.timeline()

        // Phase 1: popup entrance — scale up from nothing with elastic bounce
        tl.fromTo(popupEl,
          { scale: 0, opacity: 0, y: 50 },
          { scale: 1.15, opacity: 1, y: 0, duration: 0.4, ease: 'back.out(2)' }
        )
        // Phase 2: overshoot snap-back
        .to(popupEl, { scale: 1, duration: 0.2, ease: 'power2.out' })
        // Phase 3: excitement shake
        .to(popupEl, {
          rotation: 3, yoyo: true, repeat: 7, duration: 0.05,
          ease: 'power1.inOut'
        })
        .set(popupEl, { rotation: 0 })

        // Phase 4: confetti burst (slightly delayed)
        setTimeout(() => {
          // Side cannons
          confetti({ particleCount: 100, angle: 60, spread: 80, origin: { x: 0, y: 0.7 }, startVelocity: 55 })
          confetti({ particleCount: 100, angle: 120, spread: 80, origin: { x: 1, y: 0.7 }, startVelocity: 55 })

          // Center burst with emojis
          const scalar = 2
          const shapes = [
            confetti.shapeFromText({ text: '🎉', scalar }),
            confetti.shapeFromText({ text: '🛒', scalar }),
          ]
          setTimeout(() => {
            confetti({ shapes, scalar, particleCount: 30, spread: 160, origin: { y: 0.5 } })
          }, 300)
        }, 400)

        // Phase 5: auto-dismiss after 5 seconds
        tl.to(popupEl, {
          scale: 0, opacity: 0, y: -30, rotation: 15,
          duration: 0.5, ease: 'power3.in', delay: 4.5
        })
      }
      ```
    packages:
      - "gsap@^3.12.7"
      - "canvas-confetti@^1.9.3"
    references:
      - "https://gsap.com/docs/v3/GSAP/Timeline/"
      - "https://github.com/catdad/canvas-confetti"

