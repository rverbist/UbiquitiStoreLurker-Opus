framework_recommendation:
  chosen: "Vue 3 (Composition API + <script setup> + Vite)"
  rationale: |
    Vue 3 scores highest across all weighted criteria for this project:

    1. **Animation**: Best-in-class built-in <Transition> and <TransitionGroup> with CSS hook classes
       AND JavaScript hook integration for GSAP. Custom class props allow Animate.css drop-in.
       TransitionGroup handles list insertion/removal animations natively — critical for the product
       grid and request log.

    2. **SignalR**: Proven integration patterns. Composable (useSignalR) maps naturally to
       Vue 3's Composition API. Connection state as reactive refs. Multiple production examples
       exist in the community.

    3. **Ecosystem**: 20,000+ packages, battle-tested UI libraries (PrimeVue for data grids,
       Vuetify for Material Design if needed), VueUse for utility composables.

    4. **Learning curve**: Template syntax is the most accessible for a backend-focused .NET
       developer. <script setup> with TypeScript provides type safety without the overhead of
       JSX mental model shifts.

    5. **Vite**: Vue's official tooling IS Vite. create-vue scaffolds a production-ready project
       in seconds. HMR for SFCs is instantaneous.

    6. **Community**: Massive; well-documented; Vue 3.5.x is the current LTS-equivalent stable line
       (as of March 2026). The framework is maintained by Evan You and a core team with corporate sponsorship.

  alternatives_considered:
    - name: "Svelte 5"
      why_not: "Smaller ecosystem, fewer SignalR examples, Runes model still maturing in community knowledge. Good technical choice but riskier for a backend dev's first SPA."
    - name: "Preact"
      why_not: "Tiny runtime but compat layer for React animation libraries adds complexity. No built-in transition system. JSX less intuitive for backend devs."
    - name: "SolidJS"
      why_not: "Excellent performance but smallest ecosystem. Fine-grained reactivity model is powerful but has a steeper learning curve. Few community reference implementations for SignalR."
    - name: "Alpine.js + htmx"
      why_not: "Fundamentally mismatched for this use case. htmx expects server-rendered HTML fragments; SignalR sends JSON. A real-time SPA with animated grids and detail panels exceeds the hypermedia approach's sweet spot."

