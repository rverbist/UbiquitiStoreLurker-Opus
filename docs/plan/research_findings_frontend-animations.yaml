tldr: |
  - Vue 3 (Composition API + Vite) is the recommended frontend framework: ~33 KB gzip runtime, excellent built-in <Transition>/<TransitionGroup> components, first-class TypeScript support, massive ecosystem (~20k+ npm packages), gentle learning curve for backend devs, and proven SignalR integration patterns.
  - GSAP (v3.12+) is the primary animation engine: timeline sequencing, stagger effects, elastic/bounce eases, gsap.context() cleanup for Vue — handles "PowerPoint 98" bombastic entrances and "tumble off screen" exits.
  - canvas-confetti (~6 KB) for the "in stock" celebration popup: lightweight, worker-offloaded, framework-agnostic, emoji shapes, zero dependencies.
  - Ubiquiti-inspired light theme: system font stack, card-based layout, #0559C9 accent blue, CSS custom properties, subtle box-shadows.
  - Vite builds into wwwroot/; ASP.NET serves via MapStaticAssets() + SPA fallback; dev proxy through Vite server.config.js.

