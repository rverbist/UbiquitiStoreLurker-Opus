# =============================================================================
# OPEN QUESTIONS
# =============================================================================
open_questions:
  - question: "Should the product grid support infinite scroll or pagination?"
    context: "For a small number of monitored products (< 50), a single grid is fine. If the list grows, virtualized scrolling (vue-virtual-scroller) may be needed."

  - question: "Should animations be configurable (reduced motion preference)?"
    context: "prefers-reduced-motion media query should be respected for accessibility. GSAP respects it via gsap.matchMedia(). Canvas-confetti has no built-in support but can be wrapped with a check."

  - question: "Is vue-router needed, or is this a single-view dashboard?"
    context: "If the app is purely a monitoring dashboard with a grid + detail panel, routing is unnecessary. Add vue-router only if separate pages (settings, history) are needed."

  - question: "GSAP license — does the free standard license cover this use case?"
    context: "GSAP's standard 'no charge' license covers most use cases including internal tools. The paid Business license is only needed if GSAP is embedded in a product sold to others. This home-lab project qualifies for the free license."

