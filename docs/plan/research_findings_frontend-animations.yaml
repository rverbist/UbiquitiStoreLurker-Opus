findings:
  - topic: "Vue 3 Built-in Transition System"
    summary: "<Transition> and <TransitionGroup> provide first-class animation hooks for enter/leave/move animations with both CSS and JavaScript approaches."
    details: |
      **<Transition> CSS Classes** (auto-prefixed with `name` prop):
      ```
      .fade-enter-from    { opacity: 0; }
      .fade-enter-active  { transition: opacity 0.5s ease; }
      .fade-enter-to      { opacity: 1; }
      .fade-leave-from    { opacity: 1; }
      .fade-leave-active  { transition: opacity 0.5s ease; }
      .fade-leave-to      { opacity: 0; }
      ```

      **<Transition> JS hooks** for GSAP integration:
      ```vue
      <Transition
        @before-enter="onBeforeEnter"
        @enter="onEnter"
        @leave="onLeave"
        :css="false"
      >
        <div v-if="show">Content</div>
      </Transition>

      <script setup lang="ts">
      import gsap from 'gsap'

      function onEnter(el: Element, done: () => void) {
        gsap.fromTo(el,
          { scale: 0, rotation: -180, opacity: 0 },
          { scale: 1, rotation: 0, opacity: 1, duration: 0.8, ease: 'elastic.out(1, 0.5)', onComplete: done }
        )
      }

      function onLeave(el: Element, done: () => void) {
        gsap.to(el, {
          rotation: 720, x: 1500, y: 800, opacity: 0,
          duration: 1.2, ease: 'power4.in', onComplete: done
        })
      }
      </script>
      ```

      **<TransitionGroup>** for list animations (product grid, request log):
      - `tag` prop specifies wrapper element
      - `move-class` for FLIP-based move animations when items reorder
      - Stagger via GSAP: use `data-index` + `@enter` JS hook

      **Custom class props** for Animate.css integration:
      ```vue
      <Transition
        enter-active-class="animate__animated animate__bounceIn"
        leave-active-class="animate__animated animate__bounceOut"
      >
      ```
    packages:
      - "vue@^3.5"
    references:
      - "https://vuejs.org/guide/built-ins/transition.html"
      - "https://vuejs.org/guide/built-ins/transition-group.html"
      - "https://vuejs.org/guide/extras/animation.html"

  - topic: "GSAP — Primary Animation Engine"
    summary: "GreenSock Animation Platform is the industry standard for complex web animations. Timeline sequencing, stagger, elastic/bounce eases, and gsap.context() for Vue cleanup."
    details: |
      **Installation**: `npm install gsap` (v3.12.7+)
      **License**: Standard (free for most uses); Business GreenSock license for restricted scenarios.
      **Size**: ~25 KB gzipped (core); ScrollTrigger adds ~10 KB.

      **Core API for this project**:
      ```typescript
      import gsap from 'gsap'

      // "PowerPoint 98" bombastic entrance — product card appears
      gsap.fromTo(cardEl,
        { scale: 0, rotation: -360, opacity: 0, y: -200 },
        {
          scale: 1, rotation: 0, opacity: 1, y: 0,
          duration: 1.0, ease: 'elastic.out(1, 0.4)',
          onComplete: () => { /* optional flourish */ }
        }
      )

      // Staggered grid entrance
      gsap.from('.product-card', {
        scale: 0, opacity: 0, rotation: -15,
        duration: 0.6, ease: 'back.out(1.7)',
        stagger: { each: 0.08, from: 'start' }
      })

      // "Tumble off screen" exit for log rows
      gsap.to(rowEl, {
        rotation: gsap.utils.random(360, 720),
        x: gsap.utils.random(-800, 800),
        y: 1000,
        opacity: 0,
        duration: 1.0,
        ease: 'power3.in'
      })

      // Timeline for "in stock" celebration sequence
      const tl = gsap.timeline()
      tl.to('.stock-popup', { scale: 1.3, duration: 0.2, ease: 'power2.out' })
        .to('.stock-popup', { scale: 1.0, duration: 0.3, ease: 'elastic.out(1, 0.3)' })
        .to('.stock-popup', { rotation: '+=10', yoyo: true, repeat: 5, duration: 0.1 }, '-=0.3')
      ```

      **Vue 3 cleanup pattern**:
      ```typescript
      import { onMounted, onUnmounted, ref } from 'vue'
      import gsap from 'gsap'

      const container = ref<HTMLElement>()
      let ctx: gsap.Context

      onMounted(() => {
        ctx = gsap.context(() => {
          gsap.from('.card', { opacity: 0, y: 50, stagger: 0.1 })
        }, container.value)
      })

      onUnmounted(() => ctx?.revert())
      ```

      **Key eases for bombastic effects**:
      - `elastic.out(1, 0.3)` — springy overshoot (entrance)
      - `bounce.out` — bouncing ball (entrance)
      - `back.out(1.7)` — slight overshoot with snap (entrance)
      - `power4.in` — aggressive acceleration (exit/tumble)
      - `expo.out` — dramatic deceleration (popup reveal)
    packages:
      - "gsap@^3.12.7"
    references:
      - "https://gsap.com/docs/v3/"
      - "https://gsap.com/docs/v3/Eases/"
      - "https://gsap.com/resources/frameworks/"

  - topic: "Confetti Libraries for 'In Stock' Celebration"
    summary: "canvas-confetti is the recommended library: ~6 KB, zero dependencies, worker-offloaded rendering, custom emoji shapes, framework-agnostic."
    details: |
      **canvas-confetti** (recommended):
      - npm: `canvas-confetti@^1.9.3`
      - Size: ~6 KB gzipped
      - GitHub stars: 10k+
      - Features: particle count, spread angle, origin position, gravity, drift, custom colors, scalar, emoji shapes via `shapeFromText`, worker offloading via `useWorker: true`
      - API:
        ```typescript
        import confetti from 'canvas-confetti'

        // Basic burst
        confetti({ particleCount: 200, spread: 160, origin: { y: 0.6 } })

        // Side cannons (epic effect)
        function fireCannons() {
          const defaults = { startVelocity: 45, spread: 100, ticks: 200, zIndex: 9999 }
          confetti({ ...defaults, particleCount: 80, origin: { x: 0.1, y: 0.8 }, angle: 60 })
          confetti({ ...defaults, particleCount: 80, origin: { x: 0.9, y: 0.8 }, angle: 120 })
        }

        // Emoji confetti
        const scalar = 2
        const shapes = [
          confetti.shapeFromText({ text: '🎉', scalar }),
          confetti.shapeFromText({ text: '🛒', scalar }),
          confetti.shapeFromText({ text: '✅', scalar }),
        ]
        confetti({ shapes, scalar, particleCount: 50, spread: 160 })

        // Continuous 3-second celebration
        const end = Date.now() + 3000
        const interval = setInterval(() => {
          if (Date.now() > end) return clearInterval(interval)
          confetti({ particleCount: 50, startVelocity: 30, spread: 360, origin: { x: Math.random(), y: Math.random() - 0.2 } })
        }, 150)

        // Custom canvas instance (for modal overlay)
        const myCanvas = document.getElementById('confetti-canvas') as HTMLCanvasElement
        const myConfetti = confetti.create(myCanvas, { resize: true, useWorker: true })
        myConfetti({ particleCount: 250, spread: 180 })
        ```

      **Alternatives considered**:
      - `js-confetti` (~4 KB): simpler API, supports emojis natively, but fewer customization options (no origin control, no worker)
      - `tsparticles` (~50+ KB): far more features (particles, fireworks, snow) but massively heavier; overkill for a confetti popup

      **Recommendation**: canvas-confetti. Small, battle-tested, worker support, custom shapes.
    packages:
      - "canvas-confetti@^1.9.3"
    references:
      - "https://github.com/catdad/canvas-confetti"
      - "https://www.npmjs.com/package/canvas-confetti"

  - topic: "CSS Animation Approaches"
    summary: "Animate.css for quick effects; custom @keyframes for project-specific animations; CSS-only approaches for simple transitions to minimize JS overhead."
    details: |
      **Animate.css** (optional complement):
      - npm: `animate.css@^4.1.1`
      - Size: ~16 KB (full); tree-shakeable via individual imports
      - Use via Vue <Transition> custom class props
      - Good for: quick prototyping, fallback animations
      - Classes useful for this project: `animate__bounceIn`, `animate__tada`, `animate__rubberBand`, `animate__zoomIn`, `animate__bounceOutRight`, `animate__flipOutX`

      **Custom @keyframes for "PowerPoint 98" effects**:
      ```css
      /* Spiral entrance */
      @keyframes spiral-in {
        0%   { transform: scale(0) rotate(-720deg); opacity: 0; }
        60%  { transform: scale(1.2) rotate(15deg); opacity: 1; }
        80%  { transform: scale(0.95) rotate(-5deg); }
        100% { transform: scale(1) rotate(0deg); }
      }

      /* Tumble off screen */
      @keyframes tumble-out {
        0%   { transform: translateX(0) rotate(0deg); opacity: 1; }
        100% { transform: translateX(120vw) rotate(720deg); opacity: 0; }
      }

      /* Pulsing glow for "in stock" badge */
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.4); }
        50%      { box-shadow: 0 0 25px rgba(34, 197, 94, 0.8); }
      }

      .stock-badge--available { animation: pulse-glow 2s ease-in-out infinite; }
      ```

      **Recommendation**: Use GSAP for complex sequenced animations (entrances, exits, celebration).
      Use CSS @keyframes for simple looping effects (glow, pulse) to offload from JS thread.
    packages:
