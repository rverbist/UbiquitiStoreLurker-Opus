  - topic: "SignalR Client Integration Patterns"
    summary: "@microsoft/signalr npm package with Vue 3 composable pattern; automatic reconnect with exponential backoff; transport negotiation (WebSocket → SSE → Long Polling)."
    details: |
      **Package**: `@microsoft/signalr@^8.0.7` (compatible with .NET 10 SignalR server)

      **Vue 3 composable pattern (useSignalR.ts)**:
      ```typescript
      import { ref, onMounted, onUnmounted, type Ref } from 'vue'
      import { HubConnectionBuilder, HubConnection, HubConnectionState, LogLevel } from '@microsoft/signalr'

      interface UseSignalROptions {
        hubUrl: string
        autoReconnectDelays?: number[]
      }

      export function useSignalR(options: UseSignalROptions) {
        const connection: Ref<HubConnection | null> = ref(null)
        const state = ref<HubConnectionState>(HubConnectionState.Disconnected)

        const defaultDelays = [0, 2000, 5000, 10000, 30000]

        function build(): HubConnection {
          return new HubConnectionBuilder()
            .withUrl(options.hubUrl)
            .withAutomaticReconnect(options.autoReconnectDelays ?? defaultDelays)
            .configureLogging(LogLevel.Information)
            .build()
        }

        async function start() {
          const conn = build()
          conn.onreconnecting(() => { state.value = HubConnectionState.Reconnecting })
          conn.onreconnected(() => { state.value = HubConnectionState.Connected })
          conn.onclose(() => { state.value = HubConnectionState.Disconnected })

          connection.value = conn
          await conn.start()
          state.value = HubConnectionState.Connected
        }

        async function stop() {
          await connection.value?.stop()
          state.value = HubConnectionState.Disconnected
        }

        function on(method: string, handler: (...args: any[]) => void) {
          connection.value?.on(method, handler)
        }

        async function invoke(method: string, ...args: any[]) {
          return connection.value?.invoke(method, ...args)
        }

        onMounted(() => start())
        onUnmounted(() => stop())

        return { connection, state, on, invoke, start, stop }
      }
      ```

      **Transport fallback**:
      - Default: WebSocket → Server-Sent Events → Long Polling (automatic negotiation)
      - Force specific: `.withUrl(url, { transport: signalR.HttpTransportType.WebSockets })`
      - Skip negotiation (WebSocket only): `.withUrl(url, { skipNegotiation: true, transport: signalR.HttpTransportType.WebSockets })`

      **Reconnection strategy**:
      - `withAutomaticReconnect()` default: [0, 2000, 10000, 30000] ms
      - Custom backoff: `withAutomaticReconnect([0, 1000, 5000, 10000, 30000, 60000])`
      - Events: `onreconnecting(error)`, `onreconnected(connectionId)`, `onclose(error)`
      - Manual restart after max retries: listen to `onclose` and implement retry loop

      **Hub method patterns**:
      - Server → Client: `connection.on("StockChanged", (product) => { ... })`
      - Client → Server: `connection.invoke("SubscribeToProduct", productUrl)`
      - Streaming: `connection.stream("WatchLogs").subscribe({ next: (log) => { ... } })`
    packages:
      - "@microsoft/signalr@^8.0.7"
    references:
      - "https://learn.microsoft.com/en-us/aspnet/core/signalr/javascript-client?view=aspnetcore-10.0"
      - "https://www.npmjs.com/package/@microsoft/signalr"

  - topic: "Product Grid + Detail Panel UX Pattern"
    summary: "CSS Grid master-detail layout; responsive grid-to-stack; lazy images; stock state visual indicators; notification bell toggle."
    details: |
      **Master-Detail Layout (CSS Grid)**:
      ```css
      .dashboard {
        display: grid;
        grid-template-columns: 1fr 400px;  /* grid | detail panel */
        grid-template-rows: auto 1fr auto;  /* header | main | log */
        gap: 1rem;
        height: 100vh;
        padding: 1rem;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1rem;
        overflow-y: auto;
      }

      .detail-panel {
        grid-row: 1 / -1;
        grid-column: 2;
        overflow-y: auto;
        border-left: 1px solid var(--color-border);
        padding: 1.5rem;
      }

      /* Responsive: stack on mobile */
      @media (max-width: 768px) {
        .dashboard {
          grid-template-columns: 1fr;
        }
        .detail-panel {
          grid-row: auto;
          grid-column: 1;
          border-left: none;
          border-top: 1px solid var(--color-border);
        }
      }
      ```

      **Product Card with stock indicators**:
      ```html
      <div class="product-card" :class="stockStatusClass">
        <img :src="product.thumbnailUrl" :alt="product.name" loading="lazy" />
        <div class="product-card__body">
          <h3>{{ product.name }}</h3>
          <span class="stock-badge" :class="stockBadgeClass">
            {{ product.stockStatus }}
          </span>
          <button class="bell-btn" :class="{ 'bell-btn--active': product.subscribed }"
                  @click="toggleSubscription(product.id)">
            🔔
          </button>
        </div>
      </div>
      ```

      **Stock state visual indicators**:
      ```css
      .product-card--in-stock    { border-left: 4px solid var(--color-success); }
      .product-card--out-of-stock { border-left: 4px solid var(--color-neutral-300); opacity: 0.7; }
      .product-card--changed     { border-left: 4px solid var(--color-warning); }

      .stock-badge--available    { background: var(--color-success-bg); color: var(--color-success); }
      .stock-badge--unavailable  { background: var(--color-neutral-100); color: var(--color-neutral-500); }

      /* Bell icon toggle */
      .bell-btn { background: none; border: none; font-size: 1.25rem; cursor: pointer; opacity: 0.4; transition: opacity 0.2s, transform 0.2s; }
      .bell-btn--active { opacity: 1; animation: bell-ring 0.5s ease; }

      @keyframes bell-ring {
        0%, 100% { transform: rotate(0deg); }
        20%      { transform: rotate(15deg); }
        40%      { transform: rotate(-15deg); }
        60%      { transform: rotate(10deg); }
        80%      { transform: rotate(-5deg); }
      }
      ```

      **Image lazy loading**: Native `loading="lazy"` attribute; for thumbnails, use small
      dimensions (240×240) with `object-fit: cover`. Consider `<img srcset>` for retina.
    packages: []
    references:
      - "https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_grid_layout"
      - "https://web.dev/patterns/layout/holy-grail/"

  - topic: "Real-Time Request Log with Animations"
    summary: "Scrollable log panel with TransitionGroup for animated row insertion and 'tumble off screen' removal."
    details: |
      **Log panel structure**:
      ```vue
      <div class="request-log">
        <h2>Request Log</h2>
        <TransitionGroup name="log" tag="div" class="log-list" @enter="onLogEnter" @leave="onLogLeave" :css="false">
          <div v-for="entry in logEntries" :key="entry.id" class="log-entry" :class="logEntryClass(entry)">
            <span class="log-time">{{ entry.timestamp }}</span>
            <span class="log-product">{{ entry.productName }}</span>
            <span class="log-status" :class="entry.statusClass">{{ entry.status }}</span>
            <span class="log-detail">{{ entry.detail }}</span>
          </div>
        </TransitionGroup>
      </div>
      ```

      **GSAP JS hooks for log animations**:
      ```typescript
      function onLogEnter(el: HTMLElement, done: () => void) {
        gsap.fromTo(el,
          { opacity: 0, x: -50, height: 0, paddingTop: 0, paddingBottom: 0 },
          { opacity: 1, x: 0, height: 'auto', paddingTop: 8, paddingBottom: 8,
            duration: 0.4, ease: 'power2.out', onComplete: done }
        )
      }

      function onLogLeave(el: HTMLElement, done: () => void) {
        // "Tumble off screen" exit
        gsap.to(el, {
          rotation: gsap.utils.random(180, 540),
          x: gsap.utils.random(500, 1000),
          y: gsap.utils.random(-100, 100),
          opacity: 0,
          height: 0,
          duration: 0.8,
          ease: 'power3.in',
          onComplete: done
        })
      }
      ```

      **Auto-scroll**: Keep log scrolled to newest entry using `scrollTo` in `nextTick` after
      pushing new entries. Cap log at ~200 entries to prevent DOM bloat.
    packages: []
    references:
      - "https://vuejs.org/guide/built-ins/transition-group.html"

  - topic: "Ubiquiti-Inspired Light Theme"
    summary: "Clean, minimal design with lots of white space; card-based layout; neutral grays; #0559C9 accent blue; system font stack; subtle shadows."
    details: |
      **Design language analysis (Ubiquiti UI)**:
      - Ubiquiti's UniFi dashboard uses an extremely clean, card-based layout.
      - Heavy use of white space; minimal visual noise.
      - Flat design with subtle shadows on cards (no gradients).
      - Rounded corners (8px radius), thin borders (1px solid) in light gray.
      - Typography: Ubiquiti uses "UI Pro" (proprietary); closest system alternative is Inter or the system font stack.
      - Primary action color: Ubiquiti blue (#0559C9 or similar #006FFF in newer UI).
      - Status indicators: colored dots/badges rather than full-color backgrounds.

      **CSS Custom Properties (theme)**:
      ```css
      :root {
        /* Ubiquiti-inspired color palette */
        --color-bg:           #F6F6F8;
        --color-surface:      #FFFFFF;
        --color-border:       #E4E4E7;
        --color-border-hover: #D1D1D6;

        /* Text */
        --color-text-primary:   #18181B;
        --color-text-secondary: #71717A;
        --color-text-muted:     #A1A1AA;

        /* Accent (Ubiquiti blue) */
        --color-accent:         #0559C9;
        --color-accent-hover:   #0447A5;
        --color-accent-light:   #EBF2FF;

        /* Status */
        --color-success:        #22C55E;
        --color-success-bg:     #F0FDF4;
        --color-warning:        #EAB308;
        --color-warning-bg:     #FEFCE8;
        --color-error:          #EF4444;
        --color-error-bg:       #FEF2F2;
        --color-neutral-100:    #F4F4F5;
        --color-neutral-300:    #D4D4D8;
        --color-neutral-500:    #71717A;

        /* Typography — system font stack */
        --font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        --font-size-xs:  0.75rem;   /* 12px */
        --font-size-sm:  0.875rem;  /* 14px */
        --font-size-base: 1rem;     /* 16px */
        --font-size-lg:  1.125rem;  /* 18px */
        --font-size-xl:  1.5rem;    /* 24px */
        --font-weight-normal: 400;
        --font-weight-medium: 500;
        --font-weight-bold:   600;

        /* Spacing */
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-6: 1.5rem;
        --space-8: 2rem;

        /* Shadows */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.05);

        /* Radii */
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
      }

      /* Base styles */
      body {
        font-family: var(--font-family);
        font-size: var(--font-size-base);
        color: var(--color-text-primary);
        background: var(--color-bg);
        -webkit-font-smoothing: antialiased;
      }

      /* Card component */
      .card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        padding: var(--space-6);
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
      }
      .card:hover {
        box-shadow: var(--shadow-md);
        border-color: var(--color-border-hover);
      }
      ```

      **Typography**: Use `Inter` as the downloadable web font (Google Fonts, ~15 KB woff2 for 400+500+600 weights)
      with system font stack fallback. This closely approximates Ubiquiti's UI Pro.
