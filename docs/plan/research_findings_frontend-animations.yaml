  - topic: "Build Integration — Vite + ASP.NET Core"
    summary: "Vite builds SPA into wwwroot/; ASP.NET serves via MapStaticAssets() + MapFallbackToFile(); dev proxy from Vite to ASP.NET backend API."
    details: |
      **Project structure**:
      ```
      StorefrontUbiquitiStoreLurker/
      ├── Program.cs
      ├── Hubs/
      │   └── StockHub.cs
      ├── ClientApp/                  ← Vite + Vue project root
      │   ├── package.json
      │   ├── vite.config.ts
      │   ├── tsconfig.json
      │   ├── index.html
      │   └── src/
      │       ├── main.ts
      │       ├── App.vue
      │       ├── composables/
      │       │   └── useSignalR.ts
      │       ├── components/
      │       └── assets/
      └── wwwroot/                    ← Vite build output (gitignored)
          ├── index.html
          └── assets/
              ├── index-[hash].js
              └── index-[hash].css
      ```

      **vite.config.ts**:
      ```typescript
      import { defineConfig } from 'vite'
      import vue from '@vitejs/plugin-vue'

      export default defineConfig({
        plugins: [vue()],
        root: '.',
        build: {
          outDir: '../wwwroot',
          emptyOutDir: true,
        },
        server: {
          proxy: {
            '/api': 'https://localhost:5001',
            '/stockhub': {
              target: 'https://localhost:5001',
              ws: true,           // WebSocket proxy for SignalR
              secure: false,
            },
          },
        },
      })
      ```

      **ASP.NET Program.cs (production serving)**:
      ```csharp
      var builder = WebApplication.CreateBuilder(args);
      builder.Services.AddSignalR();

      var app = builder.Build();

      app.MapStaticAssets();          // .NET 10: optimized static file serving with fingerprinting
      app.MapHub<StockHub>("/stockhub");
      app.MapFallbackToFile("index.html");  // SPA fallback routing

      app.Run();
      ```

      **Development workflow**:
      1. `cd ClientApp && npm run dev` — starts Vite dev server on port 5173
      2. `dotnet run` — starts ASP.NET on port 5001
      3. Vite proxies `/api/*` and `/stockhub` to ASP.NET; HMR on port 5173

      **Production build**:
      1. `cd ClientApp && npm run build` — outputs to `wwwroot/`
      2. `dotnet publish` — includes wwwroot/ in publish output
      3. ASP.NET serves everything from MapStaticAssets()

      **MSBuild integration (optional — auto-build on publish)**:
      ```xml
      <Target Name="NpmBuild" BeforeTargets="Build" Condition="'$(Configuration)' == 'Release'">
        <Exec Command="npm --prefix ClientApp install" />
        <Exec Command="npm --prefix ClientApp run build" />
      </Target>
      ```
