  - topic: "HTML Parsing with AngleSharp"
    summary: >
      AngleSharp is a standards-compliant .NET HTML parser with CSS selector
      support, DOM manipulation, and element attribute/text content access.
      It provides BrowsingContext for async loading and HtmlParser for
      synchronous/async parsing. Stock detection uses multiple strategies:
      CSS-selected element text/attributes, JSON-LD structured data extraction,
      and embedded JavaScript state objects.
    details: |
      ## Core API

      Two parsing approaches:
        1. BrowsingContext.New().OpenAsync(req => req.Content(html))
           - Full browsing simulation, async
        2. new HtmlParser().ParseDocument(html)
           - Lighter, synchronous (also has ParseDocumentAsync)

      For stock monitoring, HtmlParser is sufficient — no JS execution needed.

      ## CSS Selector Queries

      document.QuerySelector("css-selector")       — first match
      document.QuerySelectorAll("css-selector")     — all matches
      element.TextContent                           — inner text
      element.GetAttribute("name")                  — attribute value
      element.HasAttribute("disabled")              — boolean check
      element.ClassName                             — CSS classes

      ## Stock Detection Strategies

      Strategy 1: Text Content Matching
        - QuerySelectorAll("button, .add-to-cart, [data-action='add-to-cart']")
        - Check TextContent for "Add to Cart", "Buy Now", "Add to Bag"
        - Check for "Sold Out", "Out of Stock", "Unavailable", "Notify Me"
        - Case-insensitive matching, trim whitespace

      Strategy 2: Button State Detection
        - QuerySelector("button[type='submit'], .product-form button")
        - Check HasAttribute("disabled") or GetAttribute("aria-disabled")
        - Check CSS classes for "disabled", "unavailable"

      Strategy 3: Schema.org / JSON-LD Structured Data
        - QuerySelectorAll("script[type='application/ld+json']")
        - Parse each script's TextContent as JSON
        - Look for @type: "Product" with offers.availability
        - Values: "https://schema.org/InStock", "https://schema.org/OutOfStock",
                  "https://schema.org/PreOrder", "https://schema.org/SoldOut"
        - Most reliable when present — structured, machine-readable

      Strategy 4: Data Attributes
        - QuerySelector("[data-availability], [data-variant-available]")
        - Common patterns: data-available="true/false"
        - Shopify: variant.available in embedded JS

      Strategy 5: Embedded JavaScript State
        - QuerySelectorAll("script:not([src])")
        - Regex match for window.__INITIAL_STATE__, __NEXT_DATA__,
          window.ShopifyAnalytics, var meta = {}, etc.
        - Extract JSON, parse, search for stock/availability fields
        - Fragile but catches SPA-rendered stores

      Strategy 6: Price/Quantity Indicators
        - QuerySelector(".price, [data-price], .product-price")
        - Presence of price often correlates with in-stock
        - QuerySelector("input[type='number'][name*='quantity']")
        - Quantity selector presence = likely in stock

      ## Parser Abstraction

      Interface: IStockParser
        - Task<StockParseResult> ParseAsync(string html, StockParserContext context)

      StockParseResult:
        - StockState: InStock | OutOfStock | Indeterminate
        - Confidence: 0.0 – 1.0
        - Evidence: string (what was matched)
        - Strategy: string (which parser found it)

      Multiple parsers run in sequence. First one with high confidence wins.
      If all return Indeterminate, emit warning and retry sooner.

      ## Product Info Extraction

      Parallel to stock state, extract:
        - Name: meta[property='og:title'], h1.product-title, JSON-LD name
        - SKU: meta[name='product:sku'], JSON-LD sku, [data-sku]
        - Price: meta[property='product:price:amount'], JSON-LD offers.price
        - Image: meta[property='og:image'], JSON-LD image
        - Description: meta[property='og:description']

    nuget_packages:
      - name: "AngleSharp"
        version: "1.3.0"
        description: >
          Standards-compliant HTML/SVG/MathML parser for .NET with CSS selector
          support and full DOM implementation.

    code_patterns:
      - pattern: "Basic HTML parsing and stock text detection"
        language: csharp
        snippet: |
          public class TextContentStockParser : IStockParser
          {
              private static readonly string[] OutOfStockPhrases =
              [
                  "sold out", "out of stock", "unavailable",
                  "notify me", "coming soon", "pre-order"
              ];

              private static readonly string[] InStockPhrases =
              [
                  "add to cart", "add to bag", "buy now", "in stock"
              ];

              public Task<StockParseResult> ParseAsync(
                  string html, StockParserContext context)
              {
                  var parser = new HtmlParser();
                  var document = parser.ParseDocument(html);

                  var bodyText = document.Body?.TextContent?.ToLowerInvariant() ?? "";

                  foreach (var phrase in OutOfStockPhrases)
                  {
                      if (bodyText.Contains(phrase))
                          return Task.FromResult(new StockParseResult
                          {
                              State = StockState.OutOfStock,
                              Confidence = 0.7,
                              Evidence = $"Text contains '{phrase}'",
                              Strategy = nameof(TextContentStockParser)
                          });
                  }

                  // Check for add-to-cart buttons specifically
                  var buttons = document.QuerySelectorAll(
                      "button, [role='button'], input[type='submit']");
                  foreach (var btn in buttons)
                  {
                      var text = btn.TextContent.Trim().ToLowerInvariant();
                      if (InStockPhrases.Any(p => text.Contains(p))
                          && !btn.HasAttribute("disabled"))
                      {
                          return Task.FromResult(new StockParseResult
                          {
                              State = StockState.InStock,
                              Confidence = 0.8,
                              Evidence = $"Active button: '{btn.TextContent.Trim()}'",
                              Strategy = nameof(TextContentStockParser)
                          });
                      }
                  }

                  return Task.FromResult(StockParseResult.Indeterminate(
                      nameof(TextContentStockParser)));
              }
          }

      - pattern: "JSON-LD structured data parser"
        language: csharp
        snippet: |
          public class JsonLdStockParser : IStockParser
          {
              public Task<StockParseResult> ParseAsync(
                  string html, StockParserContext context)
              {
                  var parser = new HtmlParser();
                  var document = parser.ParseDocument(html);

                  var scripts = document.QuerySelectorAll(
                      "script[type='application/ld+json']");

                  foreach (var script in scripts)
                  {
                      var json = script.TextContent;
                      try
                      {
                          using var doc = JsonDocument.Parse(json);
                          var availability = FindAvailability(doc.RootElement);
                          if (availability is not null)
                          {
                              var state = availability switch
                              {
                                  _ when availability.Contains("InStock") => StockState.InStock,
                                  _ when availability.Contains("OutOfStock") => StockState.OutOfStock,
                                  _ when availability.Contains("SoldOut") => StockState.OutOfStock,
                                  _ when availability.Contains("PreOrder") => StockState.InStock,
                                  _ => StockState.Indeterminate
                              };
                              return Task.FromResult(new StockParseResult
                              {
                                  State = state,
                                  Confidence = 0.95,
                                  Evidence = $"JSON-LD availability: {availability}",
                                  Strategy = nameof(JsonLdStockParser)
                              });
                          }
                      }
                      catch (JsonException) { /* skip malformed JSON-LD */ }
                  }

                  return Task.FromResult(StockParseResult.Indeterminate(
                      nameof(JsonLdStockParser)));
              }

              private static string? FindAvailability(JsonElement element)
              {
                  // Handle @graph arrays
                  if (element.ValueKind == JsonValueKind.Array)
                  {
                      foreach (var item in element.EnumerateArray())
                      {
                          var result = FindAvailability(item);
                          if (result is not null) return result;
                      }
                  }

                  if (element.TryGetProperty("@type", out var type)
                      && type.GetString() == "Product"
                      && element.TryGetProperty("offers", out var offers))
                  {
                      if (offers.TryGetProperty("availability", out var avail))
                          return avail.GetString();

                      if (offers.ValueKind == JsonValueKind.Array)
                      {
                          foreach (var offer in offers.EnumerateArray())
                          {
                              if (offer.TryGetProperty("availability", out var a))
                                  return a.GetString();
                          }
                      }
                  }

                  return null;
              }
          }

