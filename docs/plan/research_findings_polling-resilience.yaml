  - topic: "Rate Limiting — Client-Side Outbound"
    summary: >
      System.Threading.RateLimiting provides TokenBucketRateLimiter and
      SlidingWindowRateLimiter primitives. For outbound HTTP rate limiting,
      a custom DelegatingHandler wraps RateLimiter.AcquireAsync() to gate
      requests. Combined with the bounded channel (single worker), this creates
      a two-layer rate control: the channel serializes requests, and the rate
      limiter enforces timing between them.
    details: |
      ## Two-Layer Rate Control

      Layer 1: Bounded Channel with SingleReader
        - Only one request executes at a time (single worker)
        - Channel capacity limits the backlog

      Layer 2: RateLimiter in DelegatingHandler
        - TokenBucketRateLimiter or SlidingWindowRateLimiter
        - Controls minimum delay between consecutive requests
        - Returns synthetic 429 if rate exceeded (no actual HTTP call)

      The single-worker channel already serializes requests. The rate limiter
      adds timing guarantees (e.g., max 1 request per 5 seconds).

      ## TokenBucketRateLimiter

      Good for burst-then-sustain patterns:
        - TokenLimit: 1 (only one request at a time)
        - ReplenishmentPeriod: 5 seconds (one token every 5s)
        - TokensPerPeriod: 1
        - QueueLimit: 10 (wait queue for pending requests)

      ## SlidingWindowRateLimiter

      Good for strict "N requests per window" limits:
        - PermitLimit: 10 (max 10 requests per window)
        - Window: 60 seconds
        - SegmentsPerWindow: 6 (10-second segments)

      ## Per-Domain Rate Limiting

      If monitoring multiple stores, use a partitioned rate limiter:
        PartitionedRateLimiter.Create<HttpRequestMessage, string>(
            request => RateLimitPartition.GetTokenBucketLimiter(
                request.RequestUri!.Host, _ => new TokenBucketRateLimiterOptions { ... }));

      ## Configuration Model

      Rate limits should be configurable per store:
        - MinDelayBetweenRequestsMs: 5000
        - MaxRequestsPerMinute: 10
        - BurstAllowance: 1

    nuget_packages:
      - name: "System.Threading.RateLimiting"
        version: "included in .NET 8+ runtime"
        description: "Rate limiting primitives (TokenBucket, SlidingWindow, Fixed, Concurrency)"

    code_patterns:
      - pattern: "DelegatingHandler with client-side rate limiter"
        language: csharp
        snippet: |
          internal sealed class ClientSideRateLimitedHandler(
              RateLimiter limiter) : DelegatingHandler, IAsyncDisposable
          {
              protected override async Task<HttpResponseMessage> SendAsync(
                  HttpRequestMessage request, CancellationToken cancellationToken)
              {
                  using RateLimitLease lease = await limiter.AcquireAsync(
                      permitCount: 1, cancellationToken);

                  if (lease.IsAcquired)
                      return await base.SendAsync(request, cancellationToken);

                  var response = new HttpResponseMessage(HttpStatusCode.TooManyRequests);
                  if (lease.TryGetMetadata(MetadataName.RetryAfter, out TimeSpan retryAfter))
                  {
                      response.Headers.Add("Retry-After",
                          ((int)retryAfter.TotalSeconds).ToString(
                              NumberFormatInfo.InvariantInfo));
                  }
                  return response;
              }

              async ValueTask IAsyncDisposable.DisposeAsync()
              {
                  await limiter.DisposeAsync().ConfigureAwait(false);
                  Dispose(disposing: false);
                  GC.SuppressFinalize(this);
              }
          }

      - pattern: "TokenBucketRateLimiter configuration"
        language: csharp
        snippet: |
          var rateLimiter = new TokenBucketRateLimiter(new TokenBucketRateLimiterOptions
          {
              TokenLimit = 1,
              QueueProcessingOrder = QueueProcessingOrder.OldestFirst,
              QueueLimit = 20,
              ReplenishmentPeriod = TimeSpan.FromSeconds(5),
              TokensPerPeriod = 1,
              AutoReplenishment = true
          });

      - pattern: "Registering rate-limited handler with IHttpClientFactory"
        language: csharp
        snippet: |
          builder.Services.AddHttpClient("StorePoller")
              .ConfigurePrimaryHttpMessageHandler(() => new SocketsHttpHandler
              {
                  AutomaticDecompression = DecompressionMethods.All,
                  PooledConnectionLifetime = TimeSpan.FromMinutes(5)
              })
              .AddHttpMessageHandler(sp =>
              {
                  var options = sp.GetRequiredService<IOptions<RateLimitOptions>>().Value;
                  var limiter = new TokenBucketRateLimiter(new TokenBucketRateLimiterOptions
                  {
                      TokenLimit = 1,
                      QueueProcessingOrder = QueueProcessingOrder.OldestFirst,
                      QueueLimit = 20,
                      ReplenishmentPeriod = TimeSpan.FromSeconds(options.MinDelayBetweenRequestsSeconds),
                      TokensPerPeriod = 1,
                      AutoReplenishment = true
                  });
                  return new ClientSideRateLimitedHandler(limiter);
              })
              .AddStandardResilienceHandler();

