  - topic: "Headless Browser Discovery (Playwright .NET)"
    summary: >
      Microsoft.Playwright provides .NET bindings for Chromium, Firefox, and
      WebKit automation. For the stock monitor, it is used exclusively for
      one-time discovery of storefront page structure: capturing network traffic
      (HAR), identifying internal APIs that return stock data as JSON, inspecting
      DOM structure for stock indicators, and taking screenshots for reference.
      Not used for runtime polling.
    details: |
      ## Use Cases (Discovery Only)

      1. Load a storefront product page in headless Chromium
      2. Wait for network idle (all XHR/fetch requests complete)
      3. Record HAR to capture all HTTP requests and responses
      4. Inspect responses for JSON APIs that contain stock/inventory data
      5. If a JSON API is found, configure the poller to use it directly
         (faster, less bandwidth, more reliable than HTML parsing)
      6. Inspect DOM for stock indicators (training data for HTML parsers)
      7. Take screenshots for reference documentation

      ## HAR Recording

      Record all network traffic to a HAR file:
        var context = await browser.NewContextAsync(new()
        {
            RecordHarPath = "discovery.har",
            RecordHarUrlFilterString = "**/api/**"
        });
        var page = await context.NewPageAsync();
        await page.GotoAsync(productUrl);
        await page.WaitForLoadStateAsync(LoadState.NetworkIdle);
        await context.CloseAsync(); // HAR is saved on close

      ## Network Interception

      Intercept and inspect network requests in real-time:
        page.Response += (_, response) =>
        {
            if (response.Request.ResourceType == "xhr" ||
                response.Request.ResourceType == "fetch")
            {
                // Log URL, status, content-type
                // If JSON with stock/availability data, flag as API endpoint
            }
        };

      ## RouteFromHAR

      Replay recorded HAR for testing parsers:
        await page.RouteFromHARAsync("./discovery.har", new()
        {
            Url = "**/api/**",
            NotFound = HarNotFound.Fallback
        });

      ## DOM Inspection

      After the page loads, query DOM for stock indicators:
        var buttons = await page.QuerySelectorAllAsync(
            "button, [role='button'], .add-to-cart");
        var jsonLd = await page.EvaluateAsync<string[]>(
            "Array.from(document.querySelectorAll(" +
            "'script[type=\"application/ld+json\"]')).map(s => s.textContent)");

      ## Installation

      Playwright requires browser binaries installed separately:
        dotnet tool install --global Microsoft.Playwright.CLI
        playwright install chromium

      Or via PowerShell script (included in NuGet):
        pwsh bin/Debug/net10.0/playwright.ps1 install chromium

      ## Docker Considerations

      For Docker-based discovery:
        - Use mcr.microsoft.com/playwright/dotnet:v1.51.0-noble as base
        - Or install deps manually: npx playwright install-deps chromium
        - Significantly larger image — keep discovery as a separate tool/CLI
        - Do NOT include Playwright in the main polling service image

      ## Discovery Workflow

      1. User adds a product URL to monitor
      2. Discovery tool launches Playwright, loads the URL
      3. Records HAR, captures screenshots, inspects DOM
      4. Outputs a discovery report:
         - Found API endpoints (URL, method, response shape)
         - Found stock indicators (CSS selectors, text patterns)
         - Recommended parser strategy
      5. Configuration is saved; runtime poller uses HTTP-only polling

    nuget_packages:
      - name: "Microsoft.Playwright"
        version: "1.51.0"
        description: >
          .NET bindings for Playwright browser automation.
          Supports Chromium, Firefox, WebKit.

    code_patterns:
      - pattern: "Discovery service with HAR recording"
        language: csharp
        snippet: |
          public class PlaywrightDiscoveryService
          {
              public async Task<DiscoveryReport> DiscoverAsync(
                  string productUrl, CancellationToken ct)
              {
                  using var playwright = await Playwright.CreateAsync();
                  await using var browser = await playwright.Chromium.LaunchAsync(
                      new() { Headless = true });

                  var harPath = Path.GetTempFileName() + ".har";
                  var context = await browser.NewContextAsync(new()
                  {
                      RecordHarPath = harPath,
                      UserAgent = "UbiquitiStoreLurker-Discovery/1.0"
                  });

                  var page = await context.NewPageAsync();
                  var apiCalls = new List<DiscoveredApiCall>();

                  page.Response += async (_, response) =>
                  {
                      if (response.Request.ResourceType is "xhr" or "fetch"
                          && response.Status == 200)
                      {
                          var contentType = response.Headers
                              .GetValueOrDefault("content-type", "");
                          if (contentType.Contains("json"))
                          {
                              var body = await response.TextAsync();
                              apiCalls.Add(new DiscoveredApiCall
                              {
                                  Url = response.Url,
                                  Method = response.Request.Method,
                                  ContentType = contentType,
                                  BodyPreview = body[..Math.Min(body.Length, 2000)]
                              });
                          }
                      }
                  };

                  await page.GotoAsync(productUrl,
                      new() { WaitUntil = WaitUntilState.NetworkIdle });

                  // Capture screenshot
                  var screenshotBytes = await page.ScreenshotAsync(
                      new() { FullPage = true });

                  // Extract JSON-LD
                  var jsonLdScripts = await page.EvaluateAsync<string[]>(
                      "Array.from(document.querySelectorAll(" +
                      "'script[type=\"application/ld+json\"]'))" +
                      ".map(s => s.textContent)");

                  // Extract page HTML for parser testing
                  var html = await page.ContentAsync();

                  await context.CloseAsync(); // Saves HAR

                  return new DiscoveryReport
                  {
                      ProductUrl = productUrl,
                      ApiCalls = apiCalls,
                      JsonLdScripts = jsonLdScripts.ToList(),
                      HarFilePath = harPath,
                      Screenshot = screenshotBytes,
                      HtmlSnapshot = html,
                      DiscoveredAt = DateTimeOffset.UtcNow
                  };
              }
          }

