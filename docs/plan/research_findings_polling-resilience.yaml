plan_id: storefront-stock-monitor-opus-20260323
objective: >
  A .NET 10 app that polls storefront product pages at randomized intervals
  through a single rate-limited queue, with retry and exponential backoff,
  respecting 429/Retry-After headers. HTML is parsed to determine stock state.
  Browser automation is for discovery only; runtime uses plain HTTP.
focus_area: "HTTP polling engine + resilience + queue + HTML parsing + headless browser discovery"
created_at: "2026-03-23"
created_by: "GitHub Copilot (gem-researcher)"
status: completed

tldr: |
  - BackgroundService + System.Threading.Channels (bounded, SingleReader) is the idiomatic .NET pattern for a polling scheduler with a single-worker consumption model.
  - Microsoft.Extensions.Http.Resilience (built on Polly v8) replaces Polly.Extensions.Http; AddStandardResilienceHandler() provides retry, circuit breaker, rate limiter, and timeout in one call.
  - 429/Retry-After handling requires a custom DelegatingHandler or Polly v8 ShouldHandle + sleepDurationProvider that reads the Retry-After header (seconds or HTTP-date).
  - System.Threading.RateLimiting provides TokenBucketRateLimiter and SlidingWindowRateLimiter for client-side outbound rate limiting via a DelegatingHandler.
  - AngleSharp (1.3.0) is the standard .NET HTML parser; supports CSS selectors, attribute access, text content extraction, and JSON-LD/script tag parsing for stock detection.
  - Microsoft.Playwright (1.51.0) .NET bindings provide HAR recording, network interception, and DOM inspection for one-time storefront discovery — not runtime polling.
  - Stock state machine (Unknown → InStock | OutOfStock | Indeterminate) with persisted transitions and change-only notifications is a clean domain model.

