        title: "Introduction to ASP.NET Core SignalR"

open_questions:
  - question: "Should the 429 response from the store trigger a global pause across all products, or just delay the specific product?"
    context: >
      A 429 from a specific storefront may indicate the IP is rate-limited globally.
      A per-product delay may not be sufficient; a global cooldown period for that
      store domain could be safer.
  - question: "Should the discovery tool be a separate CLI or integrated into the web app?"
    context: >
      Playwright adds ~200MB of browser binaries. Keeping it in the main Docker
      image bloats the runtime container significantly. A separate discovery CLI
      or sidecar container would be cleaner.
  - question: "How to handle stores that use Cloudflare or bot-detection that blocks plain HTTP?"
    context: >
      Some storefronts use Cloudflare challenges, CAPTCHAs, or JavaScript-based
      bot detection. Plain HTTP polling will get 403/503. Potential mitigations:
      rotate User-Agent, use cookies from browser session, or accept that some
      stores are not monitorable via HTTP.
  - question: "Should the rate limiter use ConcurrencyLimiter (1 concurrent) instead of TokenBucket?"
    context: >
      Since the channel already serializes to a single worker, a ConcurrencyLimiter(1)
      combined with a minimum delay (Task.Delay after each request) might be simpler
      than a TokenBucketRateLimiter. Trade-off is configuration flexibility vs simplicity.

gaps:
  - area: "Playwright .NET HAR Analysis Tooling"
    description: >
      No research was done on programmatic HAR file parsing in .NET. After
      Playwright captures a HAR, the discovery tool needs to parse and analyze
      it. There is no built-in HAR parser in .NET — a third-party NuGet or
      manual JSON deserialization of the HAR spec would be needed.
    impact: "Low — HAR is a JSON format; manual deserialization is straightforward."
  - area: "Anti-Bot / WAF Evasion Patterns"
    description: >
      No research was done on handling Cloudflare, Akamai, or other WAF/bot
      detection systems. Some storefronts will block automated HTTP requests.
      This is an ethical gray area and was intentionally not researched.
    impact: "Medium — some stores may be unmonitorable; user should be informed."
  - area: "Cookie/Session Persistence"
    description: >
      Some stores require a valid session cookie (set via JS) to serve product
      pages. The research covers CookieContainer but not session establishment
      from headless browser → HTTP client handoff.
    impact: "Low — most stores serve product pages without sessions."
