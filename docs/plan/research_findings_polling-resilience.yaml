        title: "BrowserContext.RouteFromHARAsync"

  - topic: "Stock State Machine"
    summary: >
      A simple state machine with four states: Unknown, InStock, OutOfStock,
      Indeterminate. Transitions are persisted as StockTransition records.
      Notifications fire only on state CHANGE (not on re-confirmation).
      First poll establishes initial state without notification. Indeterminate
      triggers a warning log and earlier re-poll, not a notification.
    details: |
      ## States

      enum StockState:
        Unknown       = 0   # Initial state before first poll
        InStock       = 1   # Product is available for purchase
        OutOfStock    = 2   # Product is not available
        Indeterminate = 3   # Parser couldn't determine (ambiguous)

      ## Valid Transitions

      Unknown       → InStock       (first poll: in stock)
      Unknown       → OutOfStock    (first poll: out of stock)
      Unknown       → Indeterminate (first poll: ambiguous)
      InStock       → OutOfStock    (stock depleted — NOTIFY)
      InStock       → Indeterminate (parser issue — log warning)
      OutOfStock    → InStock       (RESTOCK — NOTIFY)
      OutOfStock    → Indeterminate (parser issue — log warning)
      Indeterminate → InStock       (resolved to in stock)
      Indeterminate → OutOfStock    (resolved to out of stock)

      Self-transitions (InStock → InStock, etc.) are logged but do NOT notify.

      ## Transition Record

      StockTransition entity:
        - Id: int (PK)
        - ProductId: int (FK)
        - PreviousState: StockState
        - NewState: StockState
        - Evidence: string (from StockParseResult)
        - OccurredAtUtc: DateTimeOffset
        - HttpStatusCode: int
        - ResponseTimeMs: long

      ## Notification Rules

      1. Only notify on meaningful state changes:
         - OutOfStock → InStock  (the primary "it's back" notification)
         - InStock → OutOfStock  (optional "it sold out" notification)
      2. First poll (Unknown → X): log, don't notify
      3. Indeterminate: log warning, schedule earlier re-poll (e.g., 15s)
      4. Same-state confirmation: update LastCheckedAtUtc, no notification

      ## Product Code Anomaly Detection

      If the product page returns a different product (SKU/name mismatch):
        - Do NOT update stock state
        - Log error: "Product code mismatch: expected X, got Y"
        - Mark product as NeedsReview
        - This prevents false "in stock" notifications from redirected URLs

    code_patterns:
      - pattern: "State machine transition logic"
        language: csharp
        snippet: |
          public class StockStateManager(
              AppDbContext db,
              INotificationService notifications,
              ILogger<StockStateManager> logger)
          {
              public async Task<StockTransition> ProcessPollResult(
                  Product product,
                  StockParseResult parseResult,
                  int httpStatusCode,
                  long responseTimeMs,
                  CancellationToken ct)
              {
                  var previous = product.CurrentStockState;
                  var next = parseResult.State;

                  var transition = new StockTransition
                  {
                      ProductId = product.Id,
                      PreviousState = previous,
                      NewState = next,
                      Evidence = parseResult.Evidence,
                      OccurredAtUtc = DateTimeOffset.UtcNow,
                      HttpStatusCode = httpStatusCode,
                      ResponseTimeMs = responseTimeMs
                  };

                  db.StockTransitions.Add(transition);
                  product.CurrentStockState = next;
                  product.LastCheckedAtUtc = DateTimeOffset.UtcNow;

                  if (next == StockState.Indeterminate)
                  {
                      logger.LogWarning(
                          "Indeterminate stock state for {ProductId}, scheduling early re-poll",
                          product.Id);
                      product.NextPollDueAtUtc = DateTimeOffset.UtcNow
                          .AddSeconds(15);
                  }

                  await db.SaveChangesAsync(ct);

                  if (previous != StockState.Unknown && previous != next
                      && next != StockState.Indeterminate)
                  {
                      await notifications.NotifyStateChangeAsync(
                          product, previous, next, parseResult.Evidence, ct);
                  }

                  return transition;
              }
          }

