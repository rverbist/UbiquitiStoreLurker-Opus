  - topic: "Request Telemetry Model"
    summary: >
      Every poll request generates a telemetry record with URL, status code,
      response time, stock state, error info, retry count, and timestamp.
      Records are persisted to SQLite and broadcast via SignalR to a real-time
      dashboard. An in-memory circular buffer (last 100) provides fast access
      for the UI.
    details: |
      ## Telemetry Record

      PollRequestLog entity:
        - Id: int (PK, auto-increment)
        - ProductId: int (FK)
        - Url: string
        - HttpMethod: string ("GET")
        - HttpStatusCode: int (200, 429, 503, etc.)
        - ResponseTimeMs: long
        - StockStateDetermined: StockState?
        - ErrorMessage: string? (null on success)
        - RetryCount: int (0 = no retries)
        - RequestedAtUtc: DateTimeOffset
        - CompletedAtUtc: DateTimeOffset

      ## In-Memory Feed

      ConcurrentQueue<PollRequestLog> with a cap of 100:
        - On new entry: Enqueue, then while Count > 100: TryDequeue
        - Exposed via IRecentPollFeed for UI consumption
        - Thread-safe for concurrent reads from SignalR hub

      ## SignalR Broadcast

      After each completed poll:
        await hubContext.Clients.All.SendAsync(
            "PollCompleted", pollLog, cancellationToken);

      The dashboard subscribes and renders in real-time.

      ## Timing Measurement

      Use Stopwatch for accurate response time:
        var sw = Stopwatch.StartNew();
        var response = await httpClient.GetAsync(url, ct);
        sw.Stop();
        pollLog.ResponseTimeMs = sw.ElapsedMilliseconds;

      ## Aggregation Queries

      SQLite queries for dashboard statistics:
        - Average response time (last 24h)
        - Success/failure rate
        - Requests by status code
        - Stock state change timeline
        - Per-product poll history

    code_patterns:
      - pattern: "In-memory recent feed with capped size"
        language: csharp
        snippet: |
          public class RecentPollFeed : IRecentPollFeed
          {
              private readonly ConcurrentQueue<PollRequestLog> _queue = new();
              private const int MaxItems = 100;

              public void Add(PollRequestLog log)
              {
                  _queue.Enqueue(log);
                  while (_queue.Count > MaxItems)
                      _queue.TryDequeue(out _);
              }

              public IReadOnlyList<PollRequestLog> GetRecent()
                  => _queue.ToArray();
          }

      - pattern: "Poll execution with telemetry capture"
        language: csharp
        snippet: |
          public class PollRequestHandler(
              IHttpClientFactory httpClientFactory,
              IStockParserPipeline parserPipeline,
              StockStateManager stateManager,
              IRecentPollFeed recentFeed,
              IHubContext<DashboardHub> hubContext,
              AppDbContext db,
              ILogger<PollRequestHandler> logger) : IPollRequestHandler
          {
              public async Task ExecuteAsync(
                  PollWorkItem item, CancellationToken ct)
              {
                  var client = httpClientFactory.CreateClient("StorePoller");
                  var log = new PollRequestLog
                  {
                      ProductId = item.ProductId,
                      Url = item.Url,
                      HttpMethod = "GET",
                      RequestedAtUtc = DateTimeOffset.UtcNow
                  };

                  var sw = Stopwatch.StartNew();
                  try
                  {
                      var response = await client.GetAsync(item.Url, ct);
                      sw.Stop();

                      log.HttpStatusCode = (int)response.StatusCode;
                      log.ResponseTimeMs = sw.ElapsedMilliseconds;

                      if (response.IsSuccessStatusCode)
                      {
                          var html = await response.Content.ReadAsStringAsync(ct);
                          var product = await db.Products.FindAsync([item.ProductId], ct);
                          var parseResult = await parserPipeline.ParseAsync(html, product!);
                          log.StockStateDetermined = parseResult.State;

                          await stateManager.ProcessPollResult(
                              product!, parseResult,
                              log.HttpStatusCode, log.ResponseTimeMs, ct);
                      }
                  }
                  catch (Exception ex)
                  {
                      sw.Stop();
                      log.ResponseTimeMs = sw.ElapsedMilliseconds;
                      log.ErrorMessage = ex.Message;
                      logger.LogError(ex, "Poll failed for {Url}", item.Url);
                  }

                  log.CompletedAtUtc = DateTimeOffset.UtcNow;
                  db.PollRequestLogs.Add(log);
                  await db.SaveChangesAsync(ct);

                  recentFeed.Add(log);
                  await hubContext.Clients.All.SendAsync(
                      "PollCompleted", log, ct);
              }
          }

    references:
