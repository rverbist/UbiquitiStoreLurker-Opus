    code_patterns:
      - pattern: "Standard resilience handler with customization"
        language: csharp
        snippet: |
          builder.Services.AddHttpClient("StorePoller", client =>
          {
              client.DefaultRequestHeaders.UserAgent.ParseAdd(
                  "UbiquitiStoreLurker/1.0 (+https://github.com/owner/repo)");
              client.DefaultRequestHeaders.AcceptEncoding.ParseAdd("gzip");
              client.DefaultRequestHeaders.AcceptEncoding.ParseAdd("br");
              client.DefaultRequestHeaders.Accept.ParseAdd("text/html");
          })
          .ConfigurePrimaryHttpMessageHandler(() => new SocketsHttpHandler
          {
              AutomaticDecompression = DecompressionMethods.All,
              PooledConnectionLifetime = TimeSpan.FromMinutes(5)
          })
          .AddStandardResilienceHandler(options =>
          {
              options.Retry.MaxRetryAttempts = 3;
              options.Retry.Delay = TimeSpan.FromSeconds(2);
              options.Retry.BackoffType = DelayBackoffType.Exponential;
              options.Retry.UseJitter = true;

              options.CircuitBreaker.SamplingDuration = TimeSpan.FromSeconds(30);
              options.CircuitBreaker.FailureRatio = 0.5;
              options.CircuitBreaker.MinimumThroughput = 5;

              options.TotalRequestTimeout.Timeout = TimeSpan.FromSeconds(60);
              options.AttemptTimeout.Timeout = TimeSpan.FromSeconds(15);
          });

      - pattern: "Custom resilience pipeline with 429/Retry-After support"
        language: csharp
        snippet: |
          builder.Services.AddHttpClient("StorePoller")
              .AddResilienceHandler("polling-pipeline", pipelineBuilder =>
              {
                  pipelineBuilder.AddRetry(new HttpRetryStrategyOptions
                  {
                      MaxRetryAttempts = 3,
                      BackoffType = DelayBackoffType.Exponential,
                      UseJitter = true,
                      Delay = TimeSpan.FromSeconds(2),
                      ShouldHandle = static args => ValueTask.FromResult(
                          args.Outcome.Result?.StatusCode is
                              HttpStatusCode.TooManyRequests or
                              HttpStatusCode.RequestTimeout or
                              HttpStatusCode.InternalServerError or
                              HttpStatusCode.BadGateway or
                              HttpStatusCode.ServiceUnavailable or
                              HttpStatusCode.GatewayTimeout),
                      DelayGenerator = static args =>
                      {
                          if (args.Outcome.Result is { StatusCode: HttpStatusCode.TooManyRequests } response
                              && response.Headers.RetryAfter is { } retryAfter)
                          {
                              // Retry-After as seconds
                              if (retryAfter.Delta is { } delta)
                                  return ValueTask.FromResult<TimeSpan?>(delta);

                              // Retry-After as HTTP-date
                              if (retryAfter.Date is { } date)
                              {
                                  var delay = date.Value - DateTimeOffset.UtcNow;
                                  return ValueTask.FromResult<TimeSpan?>(
                                      delay > TimeSpan.Zero ? delay : TimeSpan.FromSeconds(1));
                              }
                          }
                          // Fall back to default exponential backoff
                          return ValueTask.FromResult<TimeSpan?>(null);
                      }
                  });

                  pipelineBuilder.AddCircuitBreaker(new HttpCircuitBreakerStrategyOptions
                  {
                      SamplingDuration = TimeSpan.FromSeconds(30),
                      FailureRatio = 0.5,
                      MinimumThroughput = 5,
                      BreakDuration = TimeSpan.FromSeconds(60)
                  });

                  pipelineBuilder.AddTimeout(TimeSpan.FromSeconds(15));
              });

      - pattern: "Retry-After header parsing utility"
        language: csharp
        snippet: |
          public static class RetryAfterParser
          {
              public static TimeSpan? Parse(HttpResponseMessage response)
              {
                  var retryAfter = response.Headers.RetryAfter;
                  if (retryAfter is null) return null;

                  if (retryAfter.Delta is { } delta)
                      return delta;

                  if (retryAfter.Date is { } date)
                  {
                      var delay = date.Value - DateTimeOffset.UtcNow;
                      return delay > TimeSpan.Zero ? delay : TimeSpan.FromSeconds(1);
                  }

                  return null;
              }
          }

