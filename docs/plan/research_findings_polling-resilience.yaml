  - topic: "HTTP Client and Resilience"
    summary: >
      IHttpClientFactory with Microsoft.Extensions.Http.Resilience is the
      recommended approach for .NET 8+. AddStandardResilienceHandler() provides
      a complete pipeline (retry with exponential backoff + jitter, circuit
      breaker, rate limiter, attempt timeout, total timeout). Custom pipelines
      via AddResilienceHandler() allow fine-tuning. Polly v8 (Polly.Core) is
      the underlying engine; Microsoft.Extensions.Http.Resilience wraps it for
      HttpClient integration.
    details: |
      ## IHttpClientFactory

      Always use IHttpClientFactory — it manages HttpMessageHandler lifetimes,
      prevents socket exhaustion, and integrates with DI. Use named clients
      for the poll worker.

      ## Microsoft.Extensions.Http.Resilience

      This package (introduced .NET 8) replaces the older Polly.Extensions.Http
      and Microsoft.Extensions.Http.Polly packages. It builds on Polly v8
      (Polly.Core) and provides:

      1. AddStandardResilienceHandler() — preconfigured pipeline:
         - Total request timeout (default 30s)
         - Retry (exponential backoff, 3 attempts, jitter)
         - Circuit breaker (10s sampling, 0.1 failure ratio, 5 min throughput)
         - Attempt timeout (default 10s)
         - Rate limiter (100 permits)

      2. AddResilienceHandler("name", builder => { }) — custom pipeline:
         - Full control over retry, circuit breaker, timeout strategies
         - Can add fallback, concurrency limiter, etc.

      ## Pipeline Configuration for Stock Monitor

      The stock monitor needs:
        - Retry: exponential backoff, 3-5 retries, jitter enabled
        - Handle 429 TooManyRequests: read Retry-After, use as delay
        - Handle 5xx: standard transient error handling
        - Circuit breaker: break on sustained failures, prevent hammering
        - Timeout: 15s per attempt, 60s total
        - Do NOT retry on 4xx (except 429): 403 means blocked, stop

      ## Retry-After Header Handling

      The Retry-After header can be:
        - Seconds: "120" (delay 120 seconds)
        - HTTP-date: "Sun, 23 Mar 2026 12:00:00 GMT"

      A custom DelegatingHandler or Polly's onRetry callback should parse this:
        1. Check if response is 429
        2. Read Retry-After header
        3. Parse as int (seconds) or DateTimeOffset (HTTP-date)
        4. Use as retry delay instead of exponential backoff

      With Polly v8, use ShouldHandle to match 429 and configure
      DelayGenerator to read the Retry-After value from the response.

      ## Polly v8 vs Microsoft.Extensions.Http.Resilience

      - Polly.Core (v8): the resilience engine — use directly for non-HTTP
      - Microsoft.Extensions.Http.Resilience: wraps Polly v8 for HttpClient
      - Use Microsoft.Extensions.Http.Resilience for HTTP scenarios
      - Both use the same ResiliencePipelineBuilder pattern
      - AddStandardResilienceHandler has sensible defaults
      - Custom resilience handler for fine-grained control

      ## HTTP Client Configuration

      Additional HttpClient settings for respectful polling:
        - User-Agent: "UbiquitiStoreLurker/1.0 (+contact@example.com)"
        - Accept-Encoding: gzip, br (automatic decompression)
        - Accept: text/html
        - Timeout: via resilience pipeline, not HttpClient.Timeout
        - Cookie handling: use CookieContainer if store requires sessions
        - Handler lifetime: 5 minutes (default is 2 min)

