findings:
  - topic: "Polling Scheduler Architecture"
    summary: >
      BackgroundService is the recommended base class for long-running hosted
      services in .NET. Combined with System.Threading.Channels (bounded channel),
      it provides a clean producer-consumer pattern: a scheduler BackgroundService
      enqueues due poll items into a channel, and a single worker BackgroundService
      dequeues and executes HTTP requests one at a time.
    details: |
      ## BackgroundService / IHostedService

      BackgroundService (Microsoft.Extensions.Hosting) is an abstract base class
      that implements IHostedService. Override ExecuteAsync(CancellationToken) to
      run the background loop. The cancellation token fires on graceful shutdown
      (default 30s timeout, configurable via ShutdownTimeout).

      Registration:
        builder.Services.AddHostedService<PollSchedulerService>();
        builder.Services.AddHostedService<PollWorkerService>();

      Hosted services start sequentially in registration order — register the
      scheduler after the worker so the worker is ready to consume.

      ## System.Threading.Channels

      Channel<T> provides a high-performance, thread-safe producer-consumer queue.
      Use Channel.CreateBounded<T>() with BoundedChannelOptions for backpressure.

      Key options:
        - Capacity: number of items before writer blocks (e.g., 100)
        - SingleWriter: true (only the scheduler writes)
        - SingleReader: true (only the worker reads — enables optimizations)
        - FullMode: BoundedChannelFullMode.Wait (block writer until space available)

      ## Scheduler Design

      The PollSchedulerService runs a loop:
        1. Query SQLite for products where NextPollDueAtUtc <= UtcNow
        2. For each due product, enqueue a PollWorkItem to the channel
        3. Update NextPollDueAtUtc = UtcNow + Random.Shared.Next(minMs, maxMs)
        4. await Task.Delay(scanIntervalMs, stoppingToken)

      The PollWorkerService runs:
        await foreach (var item in channel.Reader.ReadAllAsync(stoppingToken))
        {
            // Execute HTTP request, parse HTML, update stock state
        }

      ## Randomized Jitter

      Use Random.Shared.Next(minDelayMs, maxDelayMs) for the poll interval.
      Random.Shared is thread-safe in .NET 6+. Configurable via options:
        PollIntervalMinSeconds: 30
        PollIntervalMaxSeconds: 90

      ## Restart Resilience

      Persist NextPollDueAtUtc in the Products SQLite table. On startup, the
      scheduler immediately picks up overdue items. No in-memory timer state
      is lost on restart.

      ## Graceful Shutdown

      Both BackgroundServices observe the CancellationToken:
        - Scheduler stops enqueuing
        - Writer calls channel.Writer.Complete()
        - Worker drains remaining items (or breaks on cancellation)
        - StopAsync completes within ShutdownTimeout

    nuget_packages:
      - name: "Microsoft.Extensions.Hosting.Abstractions"
        description: "Provides BackgroundService and IHostedService"
        included_in: "Microsoft.AspNetCore.App shared framework"
      - name: "System.Threading.Channels"
        description: "In-process producer-consumer channel"
        included_in: ".NET runtime (no extra NuGet needed for .NET 10)"

    code_patterns:
      - pattern: "Bounded Channel Registration"
        language: csharp
        snippet: |
          // In Program.cs
          builder.Services.AddSingleton(Channel.CreateBounded<PollWorkItem>(
              new BoundedChannelOptions(100)
              {
                  SingleWriter = true,
                  SingleReader = true,
                  FullMode = BoundedChannelFullMode.Wait
              }));
          builder.Services.AddHostedService<PollWorkerService>();
          builder.Services.AddHostedService<PollSchedulerService>();

      - pattern: "Worker consuming from channel"
        language: csharp
        snippet: |
          public class PollWorkerService(
              Channel<PollWorkItem> channel,
              IServiceScopeFactory scopeFactory,
              ILogger<PollWorkerService> logger) : BackgroundService
          {
              protected override async Task ExecuteAsync(CancellationToken stoppingToken)
              {
                  await foreach (var item in channel.Reader.ReadAllAsync(stoppingToken))
                  {
                      using var scope = scopeFactory.CreateScope();
                      var handler = scope.ServiceProvider
                          .GetRequiredService<IPollRequestHandler>();
                      await handler.ExecuteAsync(item, stoppingToken);
                  }
              }
          }

      - pattern: "Scheduler enqueuing due items"
        language: csharp
        snippet: |
          public class PollSchedulerService(
              Channel<PollWorkItem> channel,
              IServiceScopeFactory scopeFactory,
              IOptions<PollOptions> options,
              ILogger<PollSchedulerService> logger) : BackgroundService
          {
              protected override async Task ExecuteAsync(CancellationToken stoppingToken)
              {
                  while (!stoppingToken.IsCancellationRequested)
                  {
                      using var scope = scopeFactory.CreateScope();
                      var db = scope.ServiceProvider.GetRequiredService<AppDbContext>();
                      var now = DateTimeOffset.UtcNow;

                      var dueProducts = await db.Products
                          .Where(p => p.IsActive && p.NextPollDueAtUtc <= now)
                          .ToListAsync(stoppingToken);

                      foreach (var product in dueProducts)
                      {
                          await channel.Writer.WriteAsync(
                              new PollWorkItem(product.Id, product.Url), stoppingToken);

                          var jitterMs = Random.Shared.Next(
                              options.Value.PollIntervalMinMs,
                              options.Value.PollIntervalMaxMs);
                          product.NextPollDueAtUtc = now.AddMilliseconds(jitterMs);
                      }

                      await db.SaveChangesAsync(stoppingToken);
                      await Task.Delay(options.Value.SchedulerScanIntervalMs, stoppingToken);
                  }
              }
          }

