# TOPIC 5: ASP.NET CORE HEALTH CHECKS
# =============================================================================

health_checks:
  summary: >
    ASP.NET Core health checks provide a standard mechanism for reporting app health.
    Built into Microsoft.AspNetCore.App — no extra NuGet for basic use. Custom
    IHealthCheck implementations probe specific subsystems. Supports separate
    liveness/readiness endpoints and JSON response formatting.

  packages:
    - name: "Microsoft.Extensions.Diagnostics.HealthChecks"
      notes: "Built into shared framework, no extra NuGet needed"

    - name: "Microsoft.Extensions.Diagnostics.HealthChecks.EntityFrameworkCore"
      notes: "NuGet package for AddDbContextCheck<T>()"

  basic_setup: |
    ```csharp
    builder.Services.AddHealthChecks()
        .AddCheck<PollerHeartbeatHealthCheck>(
            "poller-heartbeat",
            tags: new[] { "ready" })
        .AddCheck<DatabaseHealthCheck>(
            "database",
            tags: new[] { "ready" })
        .AddCheck<VolumeAccessHealthCheck>(
            "volume-access",
            tags: new[] { "ready" })
        .AddCheck("liveness", () => HealthCheckResult.Healthy(),
            tags: new[] { "live" });

    // Readiness: all checks tagged "ready"
    app.MapHealthChecks("/api/health", new HealthCheckOptions
    {
        Predicate = check => check.Tags.Contains("ready"),
        ResponseWriter = WriteHealthCheckResponse
    });

    // Liveness: always healthy if the process is running
    app.MapHealthChecks("/api/health/live", new HealthCheckOptions
    {
        Predicate = check => check.Tags.Contains("live")
    });
    ```

  custom_health_check_implementations:
    poller_heartbeat: |
      ```csharp
      public class PollerHeartbeatHealthCheck : IHealthCheck
      {
          private readonly StockPollerService _poller;

          public PollerHeartbeatHealthCheck(StockPollerService poller)
              => _poller = poller;

          public Task<HealthCheckResult> CheckHealthAsync(
              HealthCheckContext context,
              CancellationToken cancellationToken = default)
          {
              var lastPoll = _poller.LastPollUtc;
              if (lastPoll == default)
                  return Task.FromResult(HealthCheckResult.Degraded("Poller has not run yet."));

              var age = DateTime.UtcNow - lastPoll;
              if (age > TimeSpan.FromMinutes(5))
                  return Task.FromResult(HealthCheckResult.Unhealthy(
                      $"Last poll was {age.TotalMinutes:F1} minutes ago."));

              return Task.FromResult(HealthCheckResult.Healthy(
                  $"Last poll {age.TotalSeconds:F0}s ago."));
          }
      }
      ```

    database_check: |
      ```csharp
      // Option A: EF Core built-in check
      builder.Services.AddHealthChecks()
          .AddDbContextCheck<UbiquitiStoreLurkerDbContext>("database");

      // Option B: Custom check with specific query
      public class DatabaseHealthCheck : IHealthCheck
      {
          private readonly UbiquitiStoreLurkerDbContext _db;

          public DatabaseHealthCheck(UbiquitiStoreLurkerDbContext db) => _db = db;

          public async Task<HealthCheckResult> CheckHealthAsync(
              HealthCheckContext context,
              CancellationToken cancellationToken = default)
          {
              try
              {
                  await _db.Database.CanConnectAsync(cancellationToken);
                  return HealthCheckResult.Healthy();
              }
              catch (Exception ex)
              {
                  return HealthCheckResult.Unhealthy("Database unreachable.", ex);
              }
          }
      }
      ```

    volume_access: |
      ```csharp
      public class VolumeAccessHealthCheck : IHealthCheck
      {
          private readonly string _dataPath;

          public VolumeAccessHealthCheck(IConfiguration config)
              => _dataPath = config["DataPath"] ?? "/data";

          public Task<HealthCheckResult> CheckHealthAsync(
              HealthCheckContext context,
              CancellationToken cancellationToken = default)
          {
              if (!Directory.Exists(_dataPath))
                  return Task.FromResult(HealthCheckResult.Unhealthy(
                      $"Data volume not mounted at {_dataPath}"));

              try
              {
                  var testFile = Path.Combine(_dataPath, ".health-check");
                  File.WriteAllText(testFile, DateTime.UtcNow.ToString("O"));
                  File.Delete(testFile);
                  return Task.FromResult(HealthCheckResult.Healthy());
              }
              catch (Exception ex)
              {
                  return Task.FromResult(HealthCheckResult.Unhealthy(
                      "Data volume not writable.", ex));
              }
          }
      }
      ```

  json_response_writer: |
    ```csharp
    static Task WriteHealthCheckResponse(HttpContext context, HealthReport report)
    {
        context.Response.ContentType = "application/json";
        var result = new
        {
            status = report.Status.ToString(),
            duration = report.TotalDuration.TotalMilliseconds,
            checks = report.Entries.Select(e => new
            {
                name = e.Key,
                status = e.Value.Status.ToString(),
                description = e.Value.Description,
                duration = e.Value.Duration.TotalMilliseconds,
                exception = e.Value.Exception?.Message
            })
        };
        return context.Response.WriteAsJsonAsync(result);
    }
    ```

  docker_healthcheck: |
    ```dockerfile
    HEALTHCHECK --interval=30s --timeout=5s --start-period=10s --retries=3 \
        CMD wget -qO- http://localhost:8080/api/health/live || exit 1
    ```

    Note: Use wget (available in Alpine) or curl. The /api/health/live endpoint
    is preferred for Docker HEALTHCHECK because it only checks liveness (process
    is responsive), not readiness (all dependencies available).

  references:
    - url: "https://learn.microsoft.com/aspnet/core/host-and-deploy/health-checks?view=aspnetcore-10.0"
      title: "Health checks in ASP.NET Core"

# =============================================================================
# TOPIC 6: .NET ASPIRE (OPTIONAL, DEVELOPMENT-ONLY)
# =============================================================================

dotnet_aspire:
  summary: >
    .NET Aspire provides development-time observability through the ServiceDefaults
    project and Aspire Dashboard. It can be used WITHOUT the AppHost orchestrator —
    just reference ServiceDefaults and call ConfigureOpenTelemetry() for OTel
    logging, metrics, and tracing with OTLP export to the standalone dashboard.

  current_status: |
    Aspire 9.1 is the current stable release (aligned with .NET 9).
    Aspire 13.x packages are available as previews.
    The ServiceDefaults project template works with .NET 10 projects.

    Key point: Aspire is OPTIONAL for this project. It provides development-time
    observability (dashboard for traces, logs, metrics) but is NOT required
    for the production Docker deployment, which uses prometheus-net + Serilog
    directly.

  servicedefaults_without_apphost: |
    The Aspire ServiceDefaults project can be used standalone — no AppHost needed.
    This is the recommended approach for this project.

    1. Create ServiceDefaults project:
       ```bash
       dotnet new aspire-servicedefaults --output UbiquitiStoreLurker.ServiceDefaults
       ```

    2. Reference from the web app project:
       ```xml
       <ProjectReference Include="..\UbiquitiStoreLurker.ServiceDefaults\UbiquitiStoreLurker.ServiceDefaults.csproj" />
       ```

    3. Call in Program.cs:
       ```csharp
       var builder = WebApplication.CreateBuilder(args);

       // Aspire ServiceDefaults: OTel logging, metrics, tracing + health checks
       builder.AddServiceDefaults();
       // OR just OpenTelemetry without health checks:
       // builder.ConfigureOpenTelemetry();

       var app = builder.Build();

       // AddServiceDefaults() registers /health and /alive endpoints
       app.MapDefaultEndpoints();
       ```

    4. Set OTLP endpoint to standalone Aspire Dashboard:
       ```bash
       OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:18889
       ```

  servicedefaults_provides: |
    AddServiceDefaults() (or individual calls) configures:
    - ConfigureOpenTelemetry(): OTel SDK with logging, metrics, tracing
      - Logging: OpenTelemetry log provider (includes formatted messages + scopes)
      - Metrics: ASP.NET Core + HttpClient + Runtime instrumentation
      - Tracing: ASP.NET Core + HttpClient instrumentation
      - OTLP exporter (sends to Aspire Dashboard or any OTel collector)
    - AddDefaultHealthChecks(): /health and /alive endpoints
    - Service discovery (no-op without AppHost)
    - HttpClient resilience (Polly retry)

  standalone_dashboard: |
    Run the Aspire Dashboard as a standalone Docker container for development:
    ```bash
    docker run --rm -p 18888:18888 -p 18889:18889 \
        mcr.microsoft.com/dotnet/aspire-dashboard:latest
    ```

    Dashboard URL: http://localhost:18888
    OTLP endpoint: http://localhost:18889

    The dashboard shows:
    - Structured logs (with search and filtering)
    - Distributed traces (span waterfall)
    - Metrics (counters, histograms, gauges with time-series graphs)

  apphost_setup_optional: |
    If full Aspire orchestration is desired later:
    ```bash
    dotnet new aspire-apphost --output UbiquitiStoreLurker.AppHost
    ```

    Program.cs:
    ```csharp
    var builder = DistributedApplication.CreateBuilder(args);

    builder.AddProject<Projects.UbiquitiStoreLurker_Web>("stock-monitor");

    builder.Build().Run();
    ```

    This automatically launches the Aspire Dashboard and wires OTLP endpoints.

  keeping_aspire_optional: |
    The key design principle: Aspire is a DEVELOPMENT convenience, not a production
    dependency.

    Production: Docker container runs standalone with Serilog → stdout/files,
    prometheus-net → /api/metrics scrape endpoint, and ASP.NET health checks.

    Development: Optionally add ServiceDefaults for richer OTel observability
    via Aspire Dashboard. This is additive — it doesn't replace Serilog or
    prometheus-net, it supplements them with OTel traces and structured log
    viewing.

    Conditional inclusion in csproj:
    ```xml
    <ItemGroup Condition="'$(Configuration)' == 'Debug'">
      <ProjectReference Include="..\UbiquitiStoreLurker.ServiceDefaults\UbiquitiStoreLurker.ServiceDefaults.csproj" />
    </ItemGroup>
    ```

    Or use #if preprocessor:
    ```csharp
    #if DEBUG
    builder.AddServiceDefaults();
    #endif
    ```

  references:
    - url: "https://learn.microsoft.com/dotnet/core/diagnostics/observability-with-otel#opentelemetry-in-aspire"
      title: "OpenTelemetry in Aspire"
    - url: "https://learn.microsoft.com/dotnet/aspire/get-started/aspire-overview"
      title: "Aspire Overview"
    - url: "https://learn.microsoft.com/dotnet/aspire/fundamentals/dashboard/explore"
      title: "Aspire Dashboard"
    - url: "https://learn.microsoft.com/dotnet/core/diagnostics/observability-otlp-example"
      title: "Example: OTLP with standalone Aspire Dashboard"

# =============================================================================
# TOPIC 7: GRAFANA DASHBOARD FOR STOCK MONITOR
# =============================================================================

grafana_dashboard:
  summary: >
    A Grafana dashboard JSON model for the stock monitor can be auto-provisioned
    via the existing Grafana instance at grafana.rverbist.io. The user's monitoring
    stack at /opt/docker/infra/monitoring/ already has Prometheus at prometheus.rverbist.io
    as a data source.

  integration_with_existing_stack: |
    The user's existing infrastructure:
    - Prometheus: 172.18.1.1 (prometheus.rverbist.io) — scrapes /api/metrics
    - Grafana: 172.18.1.2 (grafana.rverbist.io) — dashboards and alerting

    To add the stock monitor as a scrape target, add to prometheus.yml:
    ```yaml
    scrape_configs:
      - job_name: stock-monitor
        scrape_interval: 15s
        metrics_path: /api/metrics
        static_configs:
          - targets: ['stock-monitor:8080']
    ```

  provisioning_via_mounted_json: |
    Grafana supports auto-provisioning dashboards via JSON files mounted into
    the container. The existing monitoring stack likely has a provisioning directory.

    Mount path: /etc/grafana/provisioning/dashboards/
    Dashboard JSON file: stock-monitor-dashboard.json

    Provisioning config (dashboards.yml):
    ```yaml
    apiVersion: 1
    providers:
      - name: stock-monitor
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards
          foldersFromFilesStructure: true
    ```

  recommended_panels:
    - panel: "Poll Rate"
      type: "time_series"
      promql: "rate(stock_monitor_polls_total[5m])"
      description: "Polls per second over 5-minute window"

    - panel: "Poll Error Rate"
      type: "time_series"
      promql: 'rate(stock_monitor_polls_total{status="error"}[5m])'
      description: "Failed polls per second"

    - panel: "Poll Duration (P50/P90/P99)"
      type: "time_series"
      promql_p50: "histogram_quantile(0.5, rate(stock_monitor_poll_duration_seconds_bucket[5m]))"
      promql_p90: "histogram_quantile(0.9, rate(stock_monitor_poll_duration_seconds_bucket[5m]))"
      promql_p99: "histogram_quantile(0.99, rate(stock_monitor_poll_duration_seconds_bucket[5m]))"

    - panel: "Stock State Gauge"
      type: "stat"
      promql: 'stock_monitor_stock_state{state_name="in_stock"}'
      description: "Current in-stock product count"

    - panel: "Notification Success Rate"
      type: "gauge"
      promql: |
        sum(rate(stock_monitor_notifications_sent_total{status="success"}[1h]))
        /
        sum(rate(stock_monitor_notifications_sent_total[1h]))
        * 100

    - panel: "Queue Depth"
      type: "stat"
      promql: "stock_monitor_queue_depth"
      description: "Products currently monitored"

    - panel: "HTTP Request Rate"
      type: "time_series"
      promql: 'rate(http_requests_received_total{job="stock-monitor"}[5m])'
      description: "API requests per second (built-in from UseHttpMetrics)"

    - panel: "Health Check Status"
      type: "table"
      promql: 'aspnetcore_healthcheck_status{job="stock-monitor"}'
      description: "0=Unhealthy, 0.5=Degraded, 1=Healthy"

  references:
    - url: "https://grafana.com/docs/grafana/latest/administration/provisioning/"
      title: "Grafana Provisioning"
    - url: "https://github.com/prometheus-net/grafana-dashboards"
      title: "prometheus-net Grafana dashboards (community)"

# =============================================================================
# INTEGRATION SUMMARY: HOW ALL PIECES FIT TOGETHER
# =============================================================================

integration_summary: |
  Program.cs pipeline order (full integration):

  ```csharp
  using Serilog;
  using Serilog.Formatting.Compact;
  using Prometheus;

  // 1. Bootstrap logger
  Log.Logger = new LoggerConfiguration()
      .WriteTo.Console(new CompactJsonFormatter())
      .CreateBootstrapLogger();

  try
  {
      var builder = WebApplication.CreateBuilder(args);

      // 2. Serilog
      builder.Services.AddSerilog((services, lc) => lc
          .ReadFrom.Configuration(builder.Configuration)
          .ReadFrom.Services(services)
          .Enrich.FromLogContext()
          .WriteTo.Console(new CompactJsonFormatter())
          .WriteTo.File(new CompactJsonFormatter(), "/logs/stock-monitor-.clef",
              rollingInterval: RollingInterval.Day,
              retainedFileCountLimit: 14));

      // 3. SignalR
      builder.Services.AddSignalR();

      // 4. Health checks + prometheus forwarding
      builder.Services.AddHealthChecks()
          .AddCheck<PollerHeartbeatHealthCheck>("poller-heartbeat", tags: new[] { "ready" })
          .AddDbContextCheck<UbiquitiStoreLurkerDbContext>("database", tags: new[] { "ready" })
          .AddCheck<VolumeAccessHealthCheck>("volume-access", tags: new[] { "ready" })
          .ForwardToPrometheus();

      // 5. Background services
      builder.Services.AddHostedService<StockPollerService>();

      // 6. EF Core, etc...
      // builder.Services.AddDbContext<UbiquitiStoreLurkerDbContext>(...);

      var app = builder.Build();

      // 7. Middleware pipeline (order matters)
      app.UseSerilogRequestLogging();
      app.UseHttpMetrics(options => options.ReduceStatusCodeCardinality());

      // 8. Endpoints
      app.MapHub<UbiquitiStoreLurkerHub>("/api/hub/stock-monitor");
      app.MapMetrics("/api/metrics");
      app.MapHealthChecks("/api/health", new HealthCheckOptions
      {
          Predicate = check => check.Tags.Contains("ready"),
          ResponseWriter = WriteHealthCheckResponse
      });
      app.MapHealthChecks("/api/health/live", new HealthCheckOptions
      {
          Predicate = _ => false  // Always healthy if process responds
      });

      // ... other API endpoints ...

      app.Run();
  }
  catch (Exception ex)
  {
      Log.Fatal(ex, "Application terminated unexpectedly");
  }
  finally
  {
      await Log.CloseAndFlushAsync();
  }
  ```

# =============================================================================
# OPEN QUESTIONS
# =============================================================================

open_questions:
  - question: "Should SignalR use MessagePack protocol for performance, or stick with JSON for easier debugging?"
    context: >
      MessagePack reduces payload size and serialization time but makes debugging
      harder (binary format). For a single-user stock monitor, JSON is likely
      sufficient and easier to debug via browser dev tools.

  - question: "Should the Grafana dashboard JSON be committed to the repo or generated on first deployment?"
    context: >
      Auto-provisioning via mounted JSON is simpler but requires the dashboard
      JSON to be maintained alongside the code. Alternatively, it could be
      created manually via the Grafana UI after deployment.

  - question: "Should Aspire ServiceDefaults be conditionally included or always referenced?"
    context: >
      Conditional inclusion (#if DEBUG or Condition in csproj) keeps the production
      image smaller but adds complexity. Always referencing it means the OTel
      packages are in the production image even if unused.

  - question: "Should the /api/metrics endpoint be protected behind the lan-only middleware or left open for the Docker proxy network?"
    context: >
      Prometheus at 172.18.1.1 needs to reach the stock-monitor container on the
      proxy network. Since all containers are on the same Docker bridge, no
      authentication is strictly needed, but the endpoint should not be exposed
      externally via Traefik.

# =============================================================================
# GAPS
# =============================================================================

gaps:
  - area: "prometheus-net version compatibility with .NET 10"
    description: >
      prometheus-net v8.2.1 was released Jan 2024. It targets .NET 6+. While it
      should work with .NET 10, there's no explicit .NET 10 certification. The
      last commit was 3 years ago — the library may be in maintenance mode.
    impact: >
      Low risk — the library uses stable ASP.NET Core APIs. If issues arise,
      OpenTelemetry Prometheus exporter is an alternative
      (OpenTelemetry.Exporter.Prometheus.AspNetCore).

  - area: "Serilog.Formatting.Compact version for .NET 10"
    description: >
      Serilog ecosystem packages are mature and well-maintained. Latest versions
      were not explicitly verified against .NET 10 in this research, though
      Serilog.AspNetCore targets netstandard2.0+ which is compatible.
    impact: "Minimal — Serilog has excellent .NET compatibility track record."

  - area: "Grafana dashboard JSON model not fully specified"
    description: >
      The research provides PromQL queries and panel types but not a complete
      Grafana dashboard JSON. The full JSON model would need to be created
      during implementation.
    impact: "Low — standard Grafana JSON model, well-documented."

  - area: "@microsoft/signalr exact npm version for .NET 10 compatibility"
    description: >
      The SignalR JS client version should match the server version. For .NET 10,
      this would be @microsoft/signalr 10.x — exact version needs verification
      at implementation time.
    impact: "Low — npm install @microsoft/signalr will get the latest compatible version."
