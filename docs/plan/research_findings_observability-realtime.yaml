# =============================================================================
# TOPIC 1: SIGNALR SERVER-SIDE (.NET 10)
# =============================================================================

signalr_server:
  summary: >
    ASP.NET Core SignalR is built into the shared framework — no additional NuGet
    package is required. It provides real-time bidirectional communication between
    server and clients using WebSockets (preferred), Server-Sent Events, or Long
    Polling as fallback transports.

  package: "Built into Microsoft.AspNetCore.App (no separate NuGet)"

  setup_in_minimal_api: |
    ```csharp
    var builder = WebApplication.CreateBuilder(args);

    builder.Services.AddSignalR();
    builder.Services.AddHostedService<StockPollerService>();

    var app = builder.Build();

    app.MapHub<UbiquitiStoreLurkerHub>("/api/hub/stock-monitor");

    app.Run();
    ```

  hub_definition_patterns:
    dynamic_hub: |
      Dynamic hubs use string-based SendAsync calls. Simpler but no compile-time safety.
      ```csharp
      public class UbiquitiStoreLurkerHub : Hub
      {
          public async Task SendMessage(string method, object arg)
              => await Clients.All.SendAsync(method, arg);
      }
      ```

    strongly_typed_hub: |
      Strongly-typed hubs use an interface for compile-time safety. This is the
      RECOMMENDED pattern for this project.
      ```csharp
      public interface IUbiquitiStoreLurkerClient
      {
          Task StockStateChanged(StockStateDto state);
          Task PollCompleted(PollResultDto result);
          Task RequestLogEntry(RequestLogDto entry);
          Task AlertTriggered(AlertDto alert);
      }

      public class UbiquitiStoreLurkerHub : Hub<IUbiquitiStoreLurkerClient>
      {
          // Client-callable methods (if needed):
          public async Task JoinProductGroup(string productCode)
              => await Groups.AddToGroupAsync(Context.ConnectionId, productCode);

          public async Task LeaveProductGroup(string productCode)
              => await Groups.RemoveFromGroupAsync(Context.ConnectionId, productCode);
      }
      ```

  broadcasting_patterns:
    to_all_clients: "await Clients.All.StockStateChanged(dto);"
    to_specific_group: "await Clients.Group(productCode).StockStateChanged(dto);"
    to_specific_connection: "await Clients.Client(connectionId).AlertTriggered(alert);"
    to_caller_only: "await Clients.Caller.PollCompleted(result);"
    to_all_except_caller: "await Clients.Others.RequestLogEntry(entry);"

  ihubcontext_injection: |
    Use IHubContext<THub, T> to push messages from background services (the poller).
    Hubs are transient — never store state in hub properties or instantiate directly.
    ```csharp
    public class StockPollerService : BackgroundService
    {
        private readonly IHubContext<UbiquitiStoreLurkerHub, IUbiquitiStoreLurkerClient> _hubContext;
        private readonly ILogger<StockPollerService> _logger;

        public StockPollerService(
            IHubContext<UbiquitiStoreLurkerHub, IUbiquitiStoreLurkerClient> hubContext,
            ILogger<StockPollerService> logger)
        {
            _hubContext = hubContext;
            _logger = logger;
        }

        protected override async Task ExecuteAsync(CancellationToken stoppingToken)
        {
            while (!stoppingToken.IsCancellationRequested)
            {
                var result = await PollProducts(stoppingToken);

                // Push to all connected clients
                await _hubContext.Clients.All.PollCompleted(result);

                // Push state change to product-specific group
                if (result.StateChanged)
                    await _hubContext.Clients.Group(result.ProductCode)
                        .StockStateChanged(result.NewState);

                await Task.Delay(TimeSpan.FromSeconds(30), stoppingToken);
            }
        }
    }
    ```

  scaling_notes: |
    Single-instance deployment uses in-memory backplane (default). No Redis or
    Azure SignalR Service needed. If scaled to multiple instances later, add
    Redis backplane via:
      builder.Services.AddSignalR().AddStackExchangeRedis(connectionString);

  hub_options: |
    ```csharp
    builder.Services.AddSignalR().AddHubOptions<UbiquitiStoreLurkerHub>(options =>
    {
        options.EnableDetailedErrors = true; // Development only
    });
    ```

  messagepack_protocol: |
    Optional performance optimization — binary protocol instead of JSON.
    NuGet: Microsoft.AspNetCore.SignalR.Protocols.MessagePack
    ```csharp
    builder.Services.AddSignalR().AddMessagePackProtocol();
    ```
    Client must also opt in: .withHubProtocol(new signalR.protocols.msgpack.MessagePackHubProtocol())

  stateful_reconnect: |
    ASP.NET Core 8+ supports stateful reconnect (buffers messages during drops):
    ```csharp
    app.MapHub<UbiquitiStoreLurkerHub>("/api/hub/stock-monitor", options =>
    {
        options.AllowStatefulReconnects = true;
    });
    ```

  references:
    - url: "https://learn.microsoft.com/aspnet/core/signalr/hubs?view=aspnetcore-10.0"
      title: "Use hubs in SignalR for ASP.NET Core"
    - url: "https://learn.microsoft.com/aspnet/core/signalr/background-services?view=aspnetcore-10.0"
      title: "Host ASP.NET Core SignalR in background services"
    - url: "https://learn.microsoft.com/aspnet/core/signalr/hubcontext?view=aspnetcore-10.0"
      title: "Send messages from outside a hub"

# =============================================================================
# TOPIC 2: SIGNALR JAVASCRIPT CLIENT (@microsoft/signalr)
# =============================================================================

signalr_client:
  summary: >
    The @microsoft/signalr npm package provides the JavaScript/TypeScript client
    for ASP.NET Core SignalR. It supports automatic reconnection, transport
    negotiation, and lifecycle event handling.

  package: "@microsoft/signalr (npm)"
  cdn_alternative: "https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"

  connection_builder: |
    ```javascript
    import * as signalR from "@microsoft/signalr";

    const connection = new signalR.HubConnectionBuilder()
        .withUrl("/api/hub/stock-monitor")
        .withAutomaticReconnect([0, 2000, 10000, 30000])
        .configureLogging(signalR.LogLevel.Information)
        .build();
    ```

  automatic_reconnect: |
    withAutomaticReconnect() configures retry behavior after connection drops.

    Default delays (no args): [0, 2000, 10000, 30000] ms — 4 attempts then gives up.
    Custom delays: withAutomaticReconnect([0, 0, 10000]) — immediate retry twice, then 10s.

    IMPORTANT: withAutomaticReconnect does NOT retry initial connection failures.
    Initial start failures must be handled manually with a retry loop.

  lifecycle_events: |
    ```javascript
    // Fires when connection is lost, before reconnect attempts start
    connection.onreconnecting(error => {
        console.warn("Connection lost. Reconnecting...", error);
        // Disable UI elements, show reconnecting indicator
    });

    // Fires when reconnection succeeds — new connectionId provided
    connection.onreconnected(connectionId => {
        console.log("Reconnected with ID:", connectionId);
        // Re-enable UI elements, hide reconnecting indicator
    });

    // Fires when all reconnect attempts fail or connection is stopped
    connection.onclose(error => {
        console.error("Connection closed permanently.", error);
        // Show "connection lost" UI, offer manual retry button
    });
    ```

  method_invocation: |
    ```javascript
    // Register server-to-client handlers
    connection.on("StockStateChanged", (state) => {
        // Update reactive store / UI with new stock state
    });

    connection.on("PollCompleted", (result) => {
        // Update request log in UI
    });

    connection.on("AlertTriggered", (alert) => {
        // Show notification toast
    });

    // Call server methods (client-to-server)
    await connection.invoke("JoinProductGroup", productCode);
    ```

  start_with_retry: |
    ```javascript
    async function startConnection() {
        try {
            await connection.start();
            console.log("SignalR connected.");
        } catch (err) {
            console.error("SignalR connection failed:", err);
            setTimeout(startConnection, 5000);
        }
    }

    startConnection();
    ```

  transport_negotiation: |
    SignalR automatically negotiates the best transport:
    1. WebSockets (preferred — full duplex, low latency)
    2. Server-Sent Events (fallback — server-to-client only, uses HTTP)
    3. Long Polling (last resort — higher latency, more overhead)

    For this single-instance Docker app, WebSockets will be used in practice.
    No sticky sessions needed since there's only one server.

  vue3_composable_pattern: |
    ```typescript
    // composables/useSignalR.ts
    import { ref, onMounted, onUnmounted } from "vue";
    import * as signalR from "@microsoft/signalr";

    export function useSignalR(hubUrl: string) {
        const connection = ref<signalR.HubConnection | null>(null);
        const connectionState = ref<string>("Disconnected");

        const build = () => {
            const conn = new signalR.HubConnectionBuilder()
                .withUrl(hubUrl)
                .withAutomaticReconnect([0, 2000, 10000, 30000])
                .build();

            conn.onreconnecting(() => { connectionState.value = "Reconnecting"; });
            conn.onreconnected(() => { connectionState.value = "Connected"; });
            conn.onclose(() => { connectionState.value = "Disconnected"; });

            return conn;
        };

        const start = async () => {
            connection.value = build();
            try {
                await connection.value.start();
                connectionState.value = "Connected";
            } catch {
                connectionState.value = "Disconnected";
                setTimeout(start, 5000);
            }
        };

        const on = (method: string, callback: (...args: any[]) => void) => {
            connection.value?.on(method, callback);
        };

        const invoke = async (method: string, ...args: any[]) => {
            return connection.value?.invoke(method, ...args);
        };

        onMounted(() => start());
        onUnmounted(() => connection.value?.stop());

        return { connection, connectionState, on, invoke };
    }
    ```

  references:
    - url: "https://learn.microsoft.com/aspnet/core/signalr/javascript-client?view=aspnetcore-10.0"
      title: "ASP.NET Core SignalR JavaScript client"

# =============================================================================
# TOPIC 3: SERILOG WITH CLEF (Compact Log Event Format)
# =============================================================================

serilog_clef:
  summary: >
    Serilog with CLEF produces machine-readable JSON-lines log output. The Compact
    Log Event Format uses short property names (@t, @mt, @l, @x) to minimize log
    volume while remaining fully structured and queryable.

  nuget_packages:
    - name: "Serilog.AspNetCore"
      purpose: "ASP.NET Core integration (UseSerilog, request logging middleware)"
      notes: "Brings in Serilog core + Microsoft.Extensions.Logging integration"

    - name: "Serilog.Settings.Configuration"
      purpose: "Read Serilog config from appsettings.json / IConfiguration"

    - name: "Serilog.Sinks.Console"
      purpose: "Console output (Docker stdout/stderr)"

    - name: "Serilog.Sinks.File"
      purpose: "Rolling file output to /logs volume"

    - name: "Serilog.Formatting.Compact"
      purpose: "CompactJsonFormatter (CLEF) and RenderedCompactJsonFormatter"

  clef_format_explanation: |
    CLEF (Compact Log Event Format) is a JSON-lines format where each log event
    is a single JSON object on one line. Key properties use @ prefix:

      @t  — Timestamp (ISO 8601, UTC)
      @mt — Message template (with placeholders, not rendered)
      @m  — Rendered message (only with RenderedCompactJsonFormatter)
      @l  — Level (omitted when Information — the default)
      @x  — Exception (full stack trace)
      @r  — Renderings array (format-specific renderings)
      @i  — Event type hash (32-bit MurmurHash of message template)

    All structured properties appear as top-level JSON keys:

    Example CLEF line:
    {"@t":"2026-03-23T14:30:00.123Z","@mt":"Poll completed for {ProductCode} in {Duration:0.00}ms","ProductCode":"SKU-001","Duration":245.67,"StatusCode":200}

    Benefits:
    - Machine-readable (grep, jq, Seq, Loki can parse directly)
    - Compact (short keys, no rendered message by default)
    - Structured (all properties preserved as typed values)
    - Log volume is ~30-50% smaller than traditional JSON formatters

  bootstrap_logger_pattern: |
    Two-stage initialization catches startup errors before the host is built:
    ```csharp
    // Program.cs — Bootstrap logger for startup errors
    using Serilog;

    Log.Logger = new LoggerConfiguration()
        .WriteTo.Console()
        .CreateBootstrapLogger();

    try
    {
        var builder = WebApplication.CreateBuilder(args);

        builder.Services.AddSerilog((services, lc) => lc
            .ReadFrom.Configuration(builder.Configuration)
            .ReadFrom.Services(services)
            .Enrich.FromLogContext()
            .WriteTo.Console(new CompactJsonFormatter())
            .WriteTo.File(
                new CompactJsonFormatter(),
                path: "/logs/stock-monitor-.clef",
                rollingInterval: RollingInterval.Day,
                fileSizeLimitBytes: 50_000_000,    // 50 MB per file
                retainedFileCountLimit: 14,         // 14 days
                rollOnFileSizeLimit: true,
                shared: true));

        var app = builder.Build();
        app.UseSerilogRequestLogging();

        // ... configure endpoints ...

        app.Run();
    }
    catch (Exception ex)
    {
        Log.Fatal(ex, "Application terminated unexpectedly");
    }
    finally
    {
        await Log.CloseAndFlushAsync();
    }
    ```

  appsettings_configuration: |
    ```json
    {
      "Serilog": {
        "MinimumLevel": {
          "Default": "Information",
          "Override": {
            "Microsoft.AspNetCore": "Warning",
            "Microsoft.AspNetCore.SignalR": "Information",
            "Microsoft.EntityFrameworkCore": "Warning",
            "Microsoft.EntityFrameworkCore.Database.Command": "Warning",
            "System.Net.Http.HttpClient": "Warning"
          }
        },
        "WriteTo": [
          {
            "Name": "Console",
            "Args": {
              "formatter": "Serilog.Formatting.Compact.CompactJsonFormatter, Serilog.Formatting.Compact"
            }
          },
          {
            "Name": "File",
            "Args": {
              "path": "/logs/stock-monitor-.clef",
              "formatter": "Serilog.Formatting.Compact.CompactJsonFormatter, Serilog.Formatting.Compact",
              "rollingInterval": "Day",
              "fileSizeLimitBytes": 50000000,
              "retainedFileCountLimit": 14,
              "rollOnFileSizeLimit": true
            }
          }
        ],
        "Enrich": ["FromLogContext"]
      }
    }
    ```

  request_logging_middleware: |
    UseSerilogRequestLogging() replaces default ASP.NET Core request logging with
    a single structured log event per request (instead of multiple events):
    ```csharp
    app.UseSerilogRequestLogging(options =>
    {
        options.EnrichDiagnosticContext = (diagnosticContext, httpContext) =>
        {
            diagnosticContext.Set("RequestHost", httpContext.Request.Host.Value);
            diagnosticContext.Set("UserAgent", httpContext.Request.Headers.UserAgent.ToString());
        };
    });
    ```

    Example CLEF output for a request:
    {"@t":"2026-03-23T14:30:00.123Z","@mt":"HTTP {RequestMethod} {RequestPath} responded {StatusCode} in {Elapsed:0.0000} ms","RequestMethod":"GET","RequestPath":"/api/products","StatusCode":200,"Elapsed":12.34,"RequestId":"0HN...","RequestHost":"localhost:8080"}

  structured_logging_best_practices: |
    DO use message templates with named placeholders:
      _logger.LogInformation("Poll completed for {ProductCode} with status {StockState}", code, state);

    DO NOT use string interpolation (loses structure):
      _logger.LogInformation($"Poll completed for {code} with status {state}");  // BAD

    DO use semantic property names that are consistent across the codebase:
      ProductCode, StockState, PollDuration, NotificationType, ErrorMessage

  references:
    - url: "https://github.com/serilog/serilog-aspnetcore"
      title: "Serilog.AspNetCore README"
    - url: "https://github.com/serilog/serilog-formatting-compact"
      title: "Serilog.Formatting.Compact (CLEF format)"
    - url: "https://clef-to.github.io/"
      title: "CLEF format specification"

