# TOPIC 4: PROMETHEUS METRICS (prometheus-net)
# =============================================================================

prometheus_metrics:
  summary: >
    prometheus-net v8.2.1 is the de-facto standard .NET library for Prometheus
    instrumentation. It provides ASP.NET Core middleware for HTTP metrics export,
    custom metric types (Counter, Gauge, Histogram, Summary), and health check
    integration. Highly performant: 261M counter inc/s, 105M histogram obs/s.

  nuget_packages:
    - name: "prometheus-net.AspNetCore"
      version: "8.2.1"
      purpose: "ASP.NET Core middleware: MapMetrics(), UseHttpMetrics()"

    - name: "prometheus-net.AspNetCore.HealthChecks"
      version: "8.2.1"
      purpose: "Forward ASP.NET health check status to Prometheus gauge"

  setup_in_minimal_api: |
    ```csharp
    var builder = WebApplication.CreateBuilder(args);

    builder.Services.AddHealthChecks()
        .AddCheck<PollerHealthCheck>("poller")
        .AddCheck<DatabaseHealthCheck>("database")
        .ForwardToPrometheus();  // from prometheus-net.AspNetCore.HealthChecks

    var app = builder.Build();

    app.UseHttpMetrics(options =>
    {
        options.ReduceStatusCodeCardinality();  // 200,201 → 2xx
    });

    app.MapMetrics("/api/metrics");  // Prometheus scrape endpoint
    app.MapHealthChecks("/api/health");

    app.Run();
    ```

  custom_metrics_for_this_app: |
    ```csharp
    using Prometheus;

    public static class UbiquitiStoreLurkerMetrics
    {
        // Counter: total polls executed, labelled by product and result status
        public static readonly Counter PollsTotal = Metrics
            .CreateCounter(
                "stock_monitor_polls_total",
                "Total number of stock polls executed.",
                labelNames: new[] { "product_code", "status" });

        // Histogram: poll duration in seconds
        public static readonly Histogram PollDuration = Metrics
            .CreateHistogram(
                "stock_monitor_poll_duration_seconds",
                "Duration of stock poll HTTP requests in seconds.",
                new HistogramConfiguration
                {
                    Buckets = Histogram.ExponentialBuckets(0.01, 2, 12)
                    // 10ms, 20ms, 40ms, ..., ~40s
                });

        // Gauge: current stock state per product (0=unknown, 1=in_stock, 2=out_of_stock, 3=preorder)
        public static readonly Gauge StockState = Metrics
            .CreateGauge(
                "stock_monitor_stock_state",
                "Current stock state for each monitored product.",
                labelNames: new[] { "product_code", "state_name" });

        // Counter: notifications sent, labelled by provider type and delivery status
        public static readonly Counter NotificationsSent = Metrics
            .CreateCounter(
                "stock_monitor_notifications_sent_total",
                "Total notifications sent.",
                labelNames: new[] { "provider_type", "status" });

        // Gauge: number of products in the monitoring queue
        public static readonly Gauge QueueDepth = Metrics
            .CreateGauge(
                "stock_monitor_queue_depth",
                "Number of products currently being monitored.");
    }
    ```

  usage_in_poller: |
    ```csharp
    // In the polling loop:
    using (UbiquitiStoreLurkerMetrics.PollDuration.NewTimer())
    {
        var response = await httpClient.GetAsync(product.Url, ct);
        UbiquitiStoreLurkerMetrics.PollsTotal
            .WithLabels(product.Code, response.IsSuccessStatusCode ? "success" : "error")
            .Inc();
    }

    // After state detection:
    UbiquitiStoreLurkerMetrics.StockState
        .WithLabels(product.Code, newState.ToString().ToLowerInvariant())
        .Set(1);

    // After notification:
    UbiquitiStoreLurkerMetrics.NotificationsSent
        .WithLabels(provider.Type, success ? "success" : "failure")
        .Inc();
    ```

  built_in_http_metrics: |
    UseHttpMetrics() automatically exports:
    - http_requests_in_progress (gauge)        — concurrent requests
    - http_requests_received_total (counter)   — total requests by method/status/endpoint
    - http_request_duration_seconds (histogram) — request duration distribution

  health_check_forwarding: |
    ForwardToPrometheus() exports:
    - aspnetcore_healthcheck_status (gauge) — 0=Unhealthy, 0.5=Degraded, 1=Healthy
      Label: name (the registered health check name)

  scrape_endpoint: |
    MapMetrics() defaults to /metrics path. For this app, use /api/metrics to
    keep all API endpoints under /api/ prefix. The endpoint returns text/plain
    in Prometheus exposition format by default.

    Prometheus scrape config (add to existing prometheus.yml):
    ```yaml
    - job_name: stock-monitor
      scrape_interval: 15s
      metrics_path: /api/metrics
      static_configs:
        - targets: ['stock-monitor:8080']
          labels:
            app: stock-monitor
    ```

  references:
    - url: "https://github.com/prometheus-net/prometheus-net"
      title: "prometheus-net GitHub README"
    - url: "https://www.nuget.org/packages/prometheus-net.AspNetCore"
      title: "prometheus-net.AspNetCore NuGet"

