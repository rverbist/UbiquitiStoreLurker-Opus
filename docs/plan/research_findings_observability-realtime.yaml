plan_id: storefront-stock-monitor-opus-20260323
objective: >
  Research observability and real-time communication patterns for a .NET 10 ASP.NET
  minimal web app: SignalR for real-time UI updates, Serilog CLEF for structured logging,
  prometheus-net for Prometheus metrics, ASP.NET health checks, optional .NET Aspire
  integration for development, and Grafana dashboard provisioning.
focus_area: "SignalR + Prometheus + Serilog CLEF + Health Checks + .NET Aspire"
created_at: "2026-03-23"
created_by: "GitHub Copilot (gem-researcher)"
status: completed

tldr: |
  - SignalR is built into ASP.NET Core 10 — no extra NuGet needed. Strongly-typed Hub<T> with IHubContext<THub, T> injection into background services is the recommended pattern for pushing stock changes from the poller.
  - @microsoft/signalr npm client supports HubConnectionBuilder with withAutomaticReconnect([0, 2000, 10000, 30000]) and lifecycle events (onreconnecting, onreconnected, onclose). Vue 3 composable pattern wraps the connection.
  - Serilog with CLEF uses 5 NuGet packages (Serilog.AspNetCore, Settings.Configuration, Sinks.Console, Sinks.File, Formatting.Compact). Bootstrap logger → UseSerilog() → UseSerilogRequestLogging() pipeline; CLEF produces JSON-lines output with @t, @mt, @l properties.
  - prometheus-net v8.2.1 (latest) provides MapMetrics() endpoint and UseHttpMetrics(). Custom metrics: counter, gauge, histogram via static readonly fields with Metrics.CreateX(). Health checks can forward to Prometheus via ForwardToPrometheus().
  - ASP.NET health checks via AddHealthChecks() + MapHealthChecks("/api/health") with custom IHealthCheck implementations for poller heartbeat, DB, and volume access. Separate liveness/readiness probes supported.
  - .NET Aspire ServiceDefaults can be used WITHOUT AppHost orchestration — just dotnet new aspire-servicedefaults, reference it, call ConfigureOpenTelemetry(). Provides OTel logging/metrics/tracing + OTLP exporter to standalone Aspire Dashboard.
  - Grafana dashboard JSON can be auto-provisioned via mounted file in the existing monitoring stack at /opt/docker/infra/monitoring/.

research_metadata:
  methodology: >
    Complex 3-pass research: (1) Microsoft Learn docs search for SignalR hubs, IHubContext,
    background services, health checks, Aspire ServiceDefaults; (2) Microsoft code sample
    search for SignalR patterns, health check implementations, Aspire configuration;
    (3) Context7 docs for Serilog.AspNetCore and Serilog CLEF formatting; GitHub README
    fetch for prometheus-net API patterns. Cross-referenced all findings for .NET 10
    compatibility and minimal API patterns.
