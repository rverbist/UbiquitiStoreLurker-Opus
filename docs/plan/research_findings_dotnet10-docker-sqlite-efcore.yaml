  - topic: ".NET 10 SDK and Runtime Status"
    summary: >
      .NET 10 reached GA on 2025-11-11 as a Long-Term Support (LTS) release,
      supported through November 2028. The latest patch is 10.0.5 released
      2026-03-12. It includes C# 14 with the field keyword, extension members,
      null-conditional assignment, implicit Span conversions, and user-defined
      checked operators.
    details: |
      Release timeline:
        - Preview 1–7: Feb–Aug 2025
        - RC1: Sep 2025
        - RC2: Oct 2025 (go-live license)
        - GA: Nov 11, 2025
        - Patch 10.0.1: Dec 9, 2025
        - Patch 10.0.2: Jan 13, 2026
        - Patch 10.0.3: Feb 10, 2026
        - Patch 10.0.4: Mar 10, 2026
        - Patch 10.0.5: Mar 12, 2026

      Target framework moniker: net10.0

      Visual Studio support: Visual Studio 2026 (Insiders and GA), VS Code with C# Dev Kit.

      SDK version: 10.0.100 (GA), patches track as 10.0.1xx.

      Key breaking changes to be aware of:
        - `dotnet new sln` uses SLNX format by default
        - `dotnet --interactive` defaults to true
        - Restore audits transitive dependencies
        - Local tool install creates manifest by default
        - Stricter NuGet validation

      Template commands:
        - `dotnet new web` — bare-minimum ASP.NET Core app (empty Program.cs with app.MapGet)
        - `dotnet new webapi` — ASP.NET Core Web API with OpenAPI, sample endpoints, and weather forecast controller/minimal endpoints
        - For this project, `dotnet new web` is recommended as the starting point since the app uses custom minimal API endpoints and does not need the webapi template scaffolding
