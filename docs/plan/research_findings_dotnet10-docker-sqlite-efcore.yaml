plan_id: storefront-stock-monitor-opus-20260323
objective: >
  Build a .NET 10 ASP.NET minimal web application that monitors storefront
  product pages for stock availability changes, runs in Docker with SQLite,
  uses EF Core, Serilog, SignalR, and multiple notification providers.
focus_area: "dotnet10-docker-sqlite-efcore"
created_at: "2026-03-23"
created_by: "GitHub Copilot (gem-researcher)"
status: completed

tldr: |
  - .NET 10 shipped GA on 2025-11-11 as LTS (supported through Nov 2028); latest patch is 10.0.5 (2026-03-12).
  - ASP.NET Core 10 adds built-in Minimal API validation (AddValidation), OpenAPI 3.1, Server-Sent Events, and improved container support.
  - EF Core 10 GA packages are at 10.0.5; SQLite provider is stable and well-supported; WAL mode is the de-facto default.
  - Official Docker images are `mcr.microsoft.com/dotnet/aspnet:10.0` and `mcr.microsoft.com/dotnet/sdk:10.0`; Alpine variants available.
  - DateTimeOffset in SQLite requires a value converter (DateTimeOffsetToBinaryConverter); enums store as integers by default.
  - SQLite migration locking uses a `__EFMigrationsLock` table (EF9+); auto-migration on startup is viable for single-instance apps.
  - Non-root container user, volume mounts for /data and /logs, health checks via EF Core DbContext probe — all well-documented patterns.

