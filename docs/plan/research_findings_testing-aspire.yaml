    - "State machine transitions (from/to state → transition type)"
    - "Notification dispatcher (transition → provider calls)"
    - "Configuration validation (invalid settings → exceptions)"
    - "Product code immutability (code cannot change once assigned)"
    - "API endpoint responses (GET /api/products, POST /api/products)"
    - "Health check endpoints (/health, /alive)"
