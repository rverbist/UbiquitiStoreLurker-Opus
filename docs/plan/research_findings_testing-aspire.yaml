    Test classes: {ComponentUnderTest}Tests (e.g., StockParserTests, NotificationDispatcherTests).
    Test methods: MethodName_Scenario_ExpectedResult (e.g., Parse_InStockHtml_ReturnsInStockState).
    Fixture files: fixture-{scenario}.html in Fixtures/ directory.
  structure_of_domain: >
    tests/UbiquitiStoreLurker.Tests/ with subdirectories mirroring src/ structure:
    Unit/ for pure logic tests, Integration/ for WebApplicationFactory tests,
    Fixtures/ for HTML test data files.
  error_handling_in_domain: >
    Tests should verify error paths: parser returns error state for malformed HTML,
    notification dispatcher handles provider failures gracefully, configuration
    validation rejects invalid input.
  testing_in_domain: >
    ~70% unit tests (parser, state machine, notification dispatch, config validation),
    ~20% integration tests (API endpoints, health checks, SignalR, EF migrations),
    ~10% optional Aspire integration tests (distributed app health, resource wiring).
  documentation_in_domain: >
    Minimal — test names should be self-documenting via the naming convention.
    Complex test setups may warrant a brief comment explaining the scenario.

