    │   │   └── StockTransitionTests.cs
    │   ├── Notifications/
    │   │   └── NotificationDispatcherTests.cs
    │   ├── Configuration/
    │   │   └── ProductConfigValidationTests.cs
    │   └── Models/
    │       └── ProductCodeTests.cs
    ├── Integration/
    │   ├── ApiEndpointTests.cs
    │   ├── HealthCheckTests.cs
    │   ├── DatabaseMigrationTests.cs
    │   └── SignalRHubTests.cs
    ├── Fixtures/
    │   ├── fixture-instock.html
    │   ├── fixture-outofstock.html
    │   ├── fixture-preorder.html
    │   ├── fixture-malformed.html
    │   └── fixture-nopriceinfo.html
    └── Helpers/
        └── TestWebApplicationFactory.cs
  mock_patterns:
    - "NSubstitute for INotificationProvider (verify dispatch calls)"
    - "NSubstitute for IHttpClientFactory (return canned HTTP responses for parser tests)"
    - "NSubstitute for IStockParser (isolate state machine from parsing logic)"
    - "In-memory SQLite replacing production SQLite in WebApplicationFactory"
    - "TestWebApplicationFactory : WebApplicationFactory<Program> for shared test configuration"

findings:
  - topic: "NUnit 4 Current State (March 2026)"
    summary: >
      NUnit 4.4.0 is the current stable release. The test adapter is still named
      NUnit3TestAdapter (at version 4.6.0) — it supports NUnit 4.x despite the
      name. NUnit.Analyzers 4.10.0 provides compile-time enforcement of the
      constraint model.
    details: |
      NuGet packages and versions (verified from Aspire template, March 2026):
        - NUnit: 4.4.0
        - NUnit3TestAdapter: 4.6.0
        - NUnit.Analyzers: 4.10.0
        - Microsoft.NET.Test.Sdk: 17.14.1
        - coverlet.collector: 6.0.4

      Key NUnit 4 changes from NUnit 3:
        1. Classic model assertions DEPRECATED:
           - Assert.AreEqual(), Assert.IsNull(), Assert.IsTrue() etc. produce
             NUnit.Analyzers warnings and will be removed in NUnit 5.
           - ONLY use Assert.That() constraint model.

        2. Constraint model examples:
           Assert.That(actual, Is.EqualTo(expected))
           Assert.That(value, Is.Not.Null)
           Assert.That(collection, Has.Count.EqualTo(3))
           Assert.That(text, Does.Contain("expected"))
           Assert.That(number, Is.GreaterThan(0).And.LessThan(100))
           Assert.That(action, Throws.TypeOf<ArgumentException>())

        3. Assert.Multiple() for grouped assertions:
           All assertions in the block execute even if one fails.
           Assert.Multiple(() => { ... });
           await Assert.MultipleAsync(async () => { ... });

        4. Improved CancellationToken support:
           [CancelAfter(30000)]  // ms, applied to test method
           public async Task MyTest(CancellationToken ct) { ... }

        5. Parameterized tests unchanged:
           [TestCase(...)], [TestCaseSource(...)], [Values(...)],
           [ValueSource(...)], [Range(...)]

        6. SetUp/TearDown attributes unchanged:
           [SetUp], [TearDown] — per test
           [OneTimeSetUp], [OneTimeTearDown] — per fixture
           [TestFixture] — optional (auto-discovered)

      Test execution:
        dotnet test                          # Run all tests
        dotnet test --filter "Category=Unit" # Run only unit tests
        dotnet test --logger "trx"           # TRX output for CI
        dotnet test /p:CollectCoverage=true  # With coverlet
    packages:
      - "NUnit 4.4.0"
      - "NUnit3TestAdapter 4.6.0"
      - "NUnit.Analyzers 4.10.0"
      - "Microsoft.NET.Test.Sdk 17.14.1"
    references:
      - "https://aspire.dev/testing/write-your-first-test"
      - "https://docs.nunit.org/articles/nunit/release-notes/framework.html"
      - "https://learn.microsoft.com/aspnet/core/test/integration-tests?view=aspnetcore-10.0"

  - topic: "Testing Patterns for the Stock Monitor Application"
    summary: >
      The testing strategy follows a pyramid: ~70% unit tests for pure logic,
      ~20% integration tests for API/DB/SignalR, and minimal Aspire tests.
      NSubstitute replaces Moq for interface mocking.
    details: |
      UNIT TESTS (~70% of test coverage):

      1. Stock Parser Tests (StockParserTests.cs):
         - Given HTML fixture with "In Stock" indicator → returns StockState.InStock
         - Given HTML fixture with "Out of Stock" → returns StockState.OutOfStock
         - Given HTML with "Pre-Order" → returns StockState.PreOrder
         - Given malformed HTML → returns StockState.Unknown (no exception)
         - Given HTML without price info → returns StockState.Unknown
         - Uses [TestCase] with fixture file names for data-driven tests
         - HTML fixtures stored in Fixtures/ directory (embedded resources or file read)

      2. State Machine Transition Tests (StockTransitionTests.cs):
         - OutOfStock → InStock = TransitionType.BackInStock
         - InStock → OutOfStock = TransitionType.WentOutOfStock
         - Same state → no transition (null or TransitionType.None)
         - Unknown → any = TransitionType.InitialDetection
         - Uses [TestCaseSource] with TestCaseData for named test cases

      3. Notification Dispatcher Tests (NotificationDispatcherTests.cs):
         - BackInStock transition → calls all enabled providers
         - WentOutOfStock transition → calls all enabled providers
         - Provider throws → does not prevent other providers from executing
         - No enabled providers → logs warning, does not throw
         - Uses NSubstitute: Substitute.For<INotificationProvider>()

      4. Configuration Validation Tests (ProductConfigValidationTests.cs):
         - Missing URL → validation error
         - Invalid URL scheme → validation error
         - Empty product code → validation error
         - Duplicate product codes → validation error
         - Valid configuration → passes validation

      5. Product Code Immutability Tests (ProductCodeTests.cs):
         - Product code is a value object / record
         - Equality by value, not reference
         - Cannot be null or whitespace (constructor validation)

      INTEGRATION TESTS (~20% of test coverage):

      1. API Endpoint Tests (ApiEndpointTests.cs):
         - GET /api/products → 200 OK with JSON array
         - GET /api/products/{code} → 200 OK with product details
         - GET /api/products/{nonexistent} → 404 Not Found
         - Uses WebApplicationFactory<Program> with in-memory SQLite

      2. Health Check Tests (HealthCheckTests.cs):
         - GET /health → 200 OK (Healthy)
         - GET /alive → 200 OK (live check passes)

      3. Database Migration Tests (DatabaseMigrationTests.cs):
         - EnsureCreated → schema matches expected tables
         - Migration can apply cleanly to empty database

      4. SignalR Hub Tests (SignalRHubTests.cs):
         - Client can connect to /hubs/stock
         - Client receives StockUpdate message when broadcast
         - Uses WebApplicationFactory + HubConnection from test client

      WHAT NOT TO TEST:
        - External HTTP calls to storefronts (mock IHttpClientFactory)
        - Actual email/push/webhook delivery (mock INotificationProvider)
        - CSS animations, UI rendering (frontend concern, not backend)
        - Timer/scheduling internals (test the handler, not the timer)

      MOCKING LIBRARY: NSubstitute 5.x
        - Preferred over Moq due to .NET 10 AOT/trimming compatibility
        - No Castle.Core dependency issues
        - Clean syntax: Substitute.For<T>(), .Returns(), .Received()
        - Arg matchers: Arg.Is<T>(), Arg.Any<T>(), Arg.Do<T>()
    packages:
      - "NSubstitute 5.x"
      - "Microsoft.AspNetCore.Mvc.Testing 10.0.x"
      - "Microsoft.EntityFrameworkCore.Sqlite 10.0.x"
    references:
      - "https://nsubstitute.github.io/help/getting-started/"
      - "https://learn.microsoft.com/aspnet/core/test/integration-tests?view=aspnetcore-10.0"

  - topic: ".NET Aspire 9.x Integration (Development Only)"
    summary: >
      Aspire 9.2+ (NuGet: Aspire.Hosting v13.1.0) provides AppHost orchestration,
      ServiceDefaults for standardized telemetry/health, and Aspire.Hosting.Testing for
      DistributedApplicationTestingBuilder. The key constraint is that Aspire must be
      OPTIONAL — production Docker deployment must not depend on Aspire.
    details: |
      ASPIRE PACKAGE VERSIONS (from official templates, March 2026):
        - Aspire.Hosting.AppHost: 13.1.0 (AppHost project SDK-style)
        - Aspire.Hosting.Testing: 13.1.0 (test project)
        - Microsoft.Extensions.ServiceDiscovery: 10.0.0
        - Microsoft.Extensions.Http.Resilience: 10.0.0
        - OpenTelemetry.Exporter.OpenTelemetryProtocol: 1.12.0
        - OpenTelemetry.Extensions.Hosting: 1.12.0
        - OpenTelemetry.Instrumentation.AspNetCore: 1.12.0
        - OpenTelemetry.Instrumentation.Http: 1.12.0
        - OpenTelemetry.Instrumentation.Runtime: 1.12.0

      APPHOST PROJECT (aspire/UbiquitiStoreLurker.AppHost/):
        Template: dotnet new aspire-apphost -n UbiquitiStoreLurker.AppHost
        Purpose: Orchestrates the stock monitor app for development
        Dashboard: Provides OTLP traces, logs, metrics at localhost:18888

        UbiquitiStoreLurker.AppHost.csproj:
          <Project Sdk="Microsoft.NET.Sdk">
            <Sdk Name="Aspire.AppHost.Sdk" Version="13.1.0" />
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net10.0</TargetFramework>
              <IsAspireHost>true</IsAspireHost>
            </PropertyGroup>
            <ItemGroup>
              <ProjectReference Include="..\..\src\UbiquitiStoreLurker.Web\UbiquitiStoreLurker.Web.csproj" />
            </ItemGroup>
          </Project>

        Program.cs:
          var builder = DistributedApplication.CreateBuilder(args);
          builder.AddProject<Projects.UbiquitiStoreLurker_Web>("ubiquitistorelurker")
              .WithHttpsHealthCheck("/health");
          builder.Build().Run();

      SERVICEDEFAULTS PROJECT (aspire/UbiquitiStoreLurker.ServiceDefaults/):
        Template: dotnet new aspire-servicedefaults -n UbiquitiStoreLurker.ServiceDefaults
        Purpose: Shared extension methods for OTel, health checks, resilience
        Key property: <IsAspireSharedProject>true</IsAspireSharedProject>

        Provides:
          - AddServiceDefaults() → OTel + health checks + service discovery + resilience
          - ConfigureOpenTelemetry() → metrics, tracing with OTLP exporter
          - AddDefaultHealthChecks() → /health and /alive endpoints
          - MapDefaultEndpoints() → maps health endpoints (dev only)

        Standalone usage (no AppHost required):
          In Program.cs: builder.AddServiceDefaults();
          Service discovery becomes a no-op without Aspire orchestration.
          OTel and health checks still function.

      ASPIRE TESTING (optional):
        Package: Aspire.Hosting.Testing 13.1.0
        API: DistributedApplicationTestingBuilder.CreateAsync<TAppHost>()

        NUnit example:
          [Test]
          public async Task UbiquitiStoreLurker_HealthEndpoint_ReturnsOk()
          {
              using var cts = new CancellationTokenSource(TimeSpan.FromSeconds(30));
              var appHost = await DistributedApplicationTestingBuilder
                  .CreateAsync<Projects.UbiquitiStoreLurker_AppHost>();
              await using var app = await appHost.BuildAsync(cts.Token);
              await app.StartAsync(cts.Token);

              using var httpClient = app.CreateHttpClient("ubiquitistorelurker");
              await app.ResourceNotifications
                  .WaitForResourceHealthyAsync("ubiquitistorelurker", cts.Token);

              using var response = await httpClient.GetAsync("/health", cts.Token);
              Assert.That(response.StatusCode, Is.EqualTo(HttpStatusCode.OK));
          }

      KEY CONSTRAINT: Aspire is OPTIONAL
        - Production Dockerfile does NOT reference AppHost or ServiceDefaults
        - AppHost is in aspire/ directory, excluded from Docker build context
        - ServiceDefaults can be consumed optionally; if removed, app still runs
        - docker-compose.yml builds from src/UbiquitiStoreLurker.Web/Dockerfile only
        - The .sln solution includes AppHost/ServiceDefaults but they are not
          required for production build/run
    packages:
      - "Aspire.Hosting.AppHost 13.1.0"
      - "Aspire.Hosting.Testing 13.1.0"
      - "Microsoft.Extensions.ServiceDiscovery 10.0.0"
    references:
      - "https://aspire.dev/testing/write-your-first-test"
      - "https://aspire.dev/fundamentals/service-defaults"
      - "https://learn.microsoft.com/dotnet/aspire/fundamentals/service-defaults"

  - topic: "Docker Compose for Development and Production"
    summary: >
      Docker Compose uses a two-file strategy: docker-compose.yml for production
      (single stock-monitor service on the proxy network with Traefik labels) and
      docker-compose.override.yml for development (port mapping, watch mode).
      Aspire is NOT part of the Docker deployment.
    details: |
      PRODUCTION docker-compose.yml:
        services:
          stock-monitor:
            container_name: stock-monitor
            build:
              context: .
              dockerfile: src/UbiquitiStoreLurker.Web/Dockerfile
            restart: unless-stopped
            env_file: .env
            volumes:
              - ./data:/app/data        # SQLite database
              - ./logs:/app/logs        # Serilog file output
            healthcheck:
              test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
              interval: 30s
              timeout: 5s
              retries: 3
              start_period: 10s
            networks:
              proxy:
                ipv4_address: 172.18.2.4  # apps tier per AGENTS.md
            labels:
              - "traefik.enable=true"
              - "traefik.http.routers.ubiquitistorelurker.rule=Host(`ubiquitistorelurker.rverbist.io`)"
              - "traefik.http.routers.ubiquitistorelurker.entrypoints=websecure"
              - "traefik.http.routers.ubiquitistorelurker.tls.certresolver=letsencrypt"
              - "traefik.http.routers.ubiquitistorelurker.middlewares=lan-only@file"
              - "traefik.http.services.ubiquitistorelurker.loadbalancer.server.port=8080"

        networks:
          proxy:
            external: true

      DEVELOPMENT docker-compose.override.yml:
        services:
          stock-monitor:
            ports:
              - "5180:8080"           # Local dev access
            environment:
              - ASPNETCORE_ENVIRONMENT=Development
              - DOTNET_USE_POLLING_FILE_WATCHER=true
            volumes:
              - .:/src                 # Source mount for hot reload
            develop:
              watch:
                - action: rebuild
                  path: ./src

      .env.example:
        NOTIFICATION__EMAIL__SMTPHOST=smtp.example.com
        NOTIFICATION__EMAIL__SMTPPORT=587
        NOTIFICATION__PUSHOVER__APITOKEN=
        NOTIFICATION__PUSHOVER__USERKEY=

      .dockerignore:
        aspire/                      # Exclude Aspire projects from Docker context
        tests/                       # Exclude test projects
        **/.git
        **/bin
        **/obj
        **/node_modules
        **/.env
        *.md
    packages: []
    references:
      - "AGENTS.md Docker section (proxy network, IP tier map)"

  - topic: "Solution Structure"
    summary: >
      The solution uses a standard multi-project layout with src/, tests/, and aspire/
      directories. The Aspire projects are in a separate aspire/ directory to emphasize
      their optional nature. Docker Compose files live at the solution root.
    details: |
      UbiquitiStoreLurker/
      ├── UbiquitiStoreLurker.sln
      ├── docker-compose.yml              # Production compose
      ├── docker-compose.override.yml     # Development overrides
      ├── .dockerignore                   # Excludes aspire/, tests/
      ├── .env.example                    # Template for secrets
      ├── .gitignore
      ├── src/
      │   └── UbiquitiStoreLurker.Web/
