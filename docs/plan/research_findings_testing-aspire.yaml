      location: "Microsoft.AspNetCore.Mvc.Testing"
      usage_pattern: >
        Creates in-process TestServer for integration tests. Override ConfigureWebHost
        to swap services (DB, notification providers). Use WithWebHostBuilder for
        per-test overrides.
    - interface: "DistributedApplicationTestingBuilder"
      location: "Aspire.Hosting.Testing"
      usage_pattern: >
        Creates distributed app test host from AppHost. Provides CreateHttpClient()
        and ResourceNotifications for resource health waits. Used for Aspire-specific
        integration tests only.
    - interface: "INotificationProvider"
      location: "src/UbiquitiStoreLurker.Web/Services/"
      usage_pattern: >
        Mocked with NSubstitute to verify notification dispatch logic without
        sending actual notifications.
    - interface: "IStockParser"
      location: "src/UbiquitiStoreLurker.Web/Parsing/"
      usage_pattern: >
        Implementation tested with HTML fixtures; can be mocked in integration
        tests to isolate state machine logic.

  data_flow_involving_domain: >
    Tests validate the following data flow:
    (1) HTML fixture → StockParser → StockState (unit test)
    (2) StockState pair → StateMachine → StockTransition (unit test)
    (3) StockTransition → NotificationDispatcher → INotificationProvider calls (unit test with mocks)
    (4) HTTP GET /api/products → JSON response (integration test via WebApplicationFactory)
    (5) HTTP GET /health → 200 OK (integration test)
    (6) SignalR hub → client connection + message receipt (integration test)

