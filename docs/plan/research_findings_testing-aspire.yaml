      The .sln includes all projects but the Docker build only touches src/.
      Aspire AppHost is for `dotnet run` development with dashboard.
      Tests run via `dotnet test` from solution root.
    packages: []
    references: []

open_questions:
  - question: "Should Aspire.Hosting.Testing be included in the test project, or should integration tests stick to WebApplicationFactory only?"
    context: >
      DistributedApplicationTestingBuilder requires the AppHost project reference which
      adds complexity. For a single-project app, WebApplicationFactory<Program> may be
      sufficient. Aspire testing is more valuable for multi-service distributed apps.
      Recommendation: start with WebApplicationFactory only, add Aspire testing later
      if the dashboard/OTel tracing becomes valuable for debugging test failures.

  - question: "Is the NUnit3TestAdapter name going to be renamed to NUnit4TestAdapter?"
    context: >
      As of March 2026, the adapter is still called NUnit3TestAdapter at version 4.6.0.
      The NUnit team has discussed renaming but hasn't shipped a separate NUnit4TestAdapter
      package. The current adapter works fine with NUnit 4.x.

  - question: "Should SignalR integration tests use the real WebSocket transport or long-polling?"
    context: >
      WebApplicationFactory's TestServer supports WebSocket connections for SignalR,
      but the test client needs to use HttpMessageHandler-based transport. The
      HubConnectionBuilder needs .WithUrl(url, o => o.HttpMessageHandlerFactory = _ => server.CreateHandler()).

  - question: "What static IP should the stock-monitor container use on the proxy network?"
    context: >
      Per AGENTS.md, app containers use 172.18.2.x. Current allocations: ha-mcp=172.18.2.1,
      awesome-copilot=172.18.2.2, unifiassistant=172.18.2.3. The next available IP is
      172.18.2.4. This should be confirmed before deployment.

gaps:
  - area: "NUnit 4 specific API deep-dive"
    description: >
      Could not access nunit.org docs directly (Tavily rate limited). NUnit 4 package
      versions and core patterns were verified from the official Aspire template csproj
      which uses NUnit 4.4.0. Detailed NUnit 4 API changes beyond constraint model
      (e.g., new attributes, parallel execution changes) not deeply researched.
    impact: >
      Low — the constraint model assertion pattern and parameterized test attributes
      are the primary patterns needed. Additional NUnit 4 features can be discovered
      during implementation.

  - area: "NSubstitute 5.x exact version"
    description: >
      The exact NSubstitute 5.x version for March 2026 was not verified. Tavily search
      was rate limited. NSubstitute 5.x is recommended based on general .NET 10
      compatibility and the Moq licensing controversy resolution.
    impact: >
      Low — specifying "5.*" in the PackageReference will pull the latest compatible
      version. NSubstitute API is stable across 5.x minor versions.

  - area: "SignalR test transport configuration"
    description: >
      The exact configuration for SignalR hub integration testing with WebApplicationFactory
      was not deeply researched. The HttpMessageHandlerFactory approach is documented but
      specific NUnit lifecycle considerations may apply.
    impact: >
      Medium — SignalR integration tests are a small portion of the test suite (~1-2 tests)
      but may require trial-and-error during implementation.
