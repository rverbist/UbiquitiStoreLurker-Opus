patterns_found:
  - category: testing
    pattern: "NUnit 4 constraint model assertions"
    description: >
      NUnit 4 deprecates classic assertion model (Assert.AreEqual, Assert.IsTrue, etc.).
      All assertions must use the constraint model: Assert.That(actual, Is.EqualTo(expected)).
      NUnit.Analyzers 4.10.0 produces compile-time warnings/errors for classic assertions.
    examples:
      - file: "IntegrationTest1.cs"
        location: "aspire.dev NUnit template"
        snippet: |
          // Correct — NUnit 4 constraint model
          Assert.That(response.StatusCode, Is.EqualTo(HttpStatusCode.OK));
          Assert.That(result, Is.Not.Null);
          Assert.That(items, Has.Count.EqualTo(3));
          Assert.That(name, Does.StartWith("Stock"));

          // DEPRECATED — do NOT use classic assertions
          // Assert.AreEqual(HttpStatusCode.OK, response.StatusCode);
          // Assert.IsNotNull(result);
    prevalence: common

  - category: testing
    pattern: "Assert.Multiple for grouped assertions"
    description: >
      NUnit 4 supports Assert.Multiple and Assert.MultipleAsync for grouping
      multiple assertions. All assertions inside the block execute even if one fails,
      providing a complete failure report.
    examples:
      - file: "NUnit 4 docs"
        location: "nunit.org/docs/4.x"
        snippet: |
          Assert.Multiple(() =>
          {
              Assert.That(product.Name, Is.EqualTo("Widget"));
              Assert.That(product.Price, Is.GreaterThan(0));
              Assert.That(product.IsInStock, Is.True);
          });

          // Async variant
          await Assert.MultipleAsync(async () =>
          {
              var response = await client.GetAsync("/api/products/1");
              Assert.That(response.StatusCode, Is.EqualTo(HttpStatusCode.OK));

              var body = await response.Content.ReadAsStringAsync();
              Assert.That(body, Does.Contain("Widget"));
          });
    prevalence: common

  - category: testing
    pattern: "Parameterized tests with TestCase and TestCaseSource"
    description: >
      NUnit 4 retains [TestCase], [TestCaseSource], and [Values] for data-driven tests.
      Ideal for testing stock parser with multiple HTML fixtures or state machine transitions.
    examples:
      - file: "StockParserTests.cs (proposed)"
        location: "tests/UbiquitiStoreLurker.Tests/"
        snippet: |
          [TestCase("fixture-instock.html", StockState.InStock)]
          [TestCase("fixture-outofstock.html", StockState.OutOfStock)]
          [TestCase("fixture-preorder.html", StockState.PreOrder)]
          public void Parse_GivenHtmlFixture_ReturnsExpectedState(
              string fixtureName, StockState expected)
          {
              var html = File.ReadAllText($"Fixtures/{fixtureName}");
              var parser = new StockParser(config);

              var result = parser.Parse(html);

              Assert.That(result.State, Is.EqualTo(expected));
          }

          // TestCaseSource for complex scenarios
          private static IEnumerable<TestCaseData> TransitionCases()
          {
              yield return new TestCaseData(
                  StockState.OutOfStock, StockState.InStock,
                  TransitionType.BackInStock)
                  .SetName("OutOfStock to InStock triggers BackInStock");
          }

          [TestCaseSource(nameof(TransitionCases))]
          public void DetectTransition_GivenStates_ReturnsExpectedType(
              StockState from, StockState to, TransitionType expected)
          {
              var result = StateMachine.DetectTransition(from, to);
              Assert.That(result, Is.EqualTo(expected));
          }
    prevalence: common

  - category: testing
    pattern: "WebApplicationFactory with NUnit"
    description: >
      NUnit uses [OneTimeSetUp]/[OneTimeTearDown] or constructor/IDisposable for
      factory lifecycle instead of xUnit's IClassFixture. The factory creates a
      TestServer hosting the real ASP.NET Core app pipeline.
    examples:
      - file: "ApiIntegrationTests.cs (proposed)"
        location: "tests/UbiquitiStoreLurker.Tests/"
        snippet: |
          public class ApiIntegrationTests
          {
              private WebApplicationFactory<Program> _factory = null!;
              private HttpClient _client = null!;

              [OneTimeSetUp]
              public void OneTimeSetUp()
              {
                  _factory = new WebApplicationFactory<Program>()
                      .WithWebHostBuilder(builder =>
                      {
                          builder.ConfigureServices(services =>
                          {
                              // Replace real DB with in-memory SQLite
                              var descriptor = services.SingleOrDefault(
                                  d => d.ServiceType == typeof(DbContextOptions<AppDbContext>));
                              if (descriptor != null) services.Remove(descriptor);

                              services.AddDbContext<AppDbContext>(options =>
                                  options.UseSqlite("DataSource=:memory:"));
                          });
                      });
                  _client = _factory.CreateClient();
              }

              [OneTimeTearDown]
              public void OneTimeTearDown()
              {
                  _client.Dispose();
                  _factory.Dispose();
              }

              [Test]
              public async Task HealthEndpoint_ReturnsHealthy()
              {
                  var response = await _client.GetAsync("/health");
                  Assert.That(response.StatusCode, Is.EqualTo(HttpStatusCode.OK));
              }
          }
    prevalence: common

  - category: testing
    pattern: "NSubstitute mocking for interfaces"
    description: >
      NSubstitute 5.x is the preferred mocking framework for .NET 10. It avoids
      Castle.Core/DynamicProxy issues that affect Moq 4.x in trimmed/AOT scenarios.
      Clean syntax: Substitute.For<T>(), .Returns(), .Received().
    examples:
      - file: "NotificationTests.cs (proposed)"
        location: "tests/UbiquitiStoreLurker.Tests/"
        snippet: |
          [Test]
          public async Task Dispatch_BackInStock_CallsAllProviders()
          {
              var emailProvider = Substitute.For<INotificationProvider>();
              var pushProvider = Substitute.For<INotificationProvider>();
              emailProvider.Name.Returns("Email");
              pushProvider.Name.Returns("Push");

              var dispatcher = new NotificationDispatcher(
                  new[] { emailProvider, pushProvider },
                  NullLogger<NotificationDispatcher>.Instance);

              var transition = new StockTransition(
                  ProductCode: "ABC-123",
                  From: StockState.OutOfStock,
                  To: StockState.InStock,
                  Type: TransitionType.BackInStock);

              await dispatcher.DispatchAsync(transition);

              await emailProvider.Received(1).SendAsync(
                  Arg.Is<StockTransition>(t => t.ProductCode == "ABC-123"));
              await pushProvider.Received(1).SendAsync(
                  Arg.Any<StockTransition>());
          }
    prevalence: common

  - category: architecture
    pattern: "Aspire AppHost as optional orchestrator"
    description: >
      The Aspire AppHost project registers the stock monitor app as a project resource
      using builder.AddProject<Projects.UbiquitiStoreLurker_Web>("ubiquitistorelurker"). The AppHost
      must remain in an /aspire directory, not referenced by the production Dockerfile.
      ServiceDefaults can be consumed by the web project optionally.
    examples:
      - file: "AppHost Program.cs (proposed)"
        location: "aspire/UbiquitiStoreLurker.AppHost/"
        snippet: |
          var builder = DistributedApplication.CreateBuilder(args);

          var app = builder.AddProject<Projects.UbiquitiStoreLurker_Web>("ubiquitistorelurker")
              .WithHttpsHealthCheck("/health");

          builder.Build().Run();
    prevalence: occasional

  - category: architecture
    pattern: "ServiceDefaults standalone usage (without AppHost)"
    description: >
      ServiceDefaults can be consumed by the web app independently of the AppHost.
      In production Docker, the app calls builder.AddServiceDefaults() for OTel and
      health checks. Service discovery becomes a no-op without Aspire orchestration.
      The IsAspireSharedProject=true property in ServiceDefaults.csproj enables
      automatic project referencing when using Aspire tooling.
    examples:
      - file: "Program.cs (web app)"
        location: "src/UbiquitiStoreLurker.Web/"
        snippet: |
          var builder = WebApplication.CreateBuilder(args);

          // Optional: Aspire service defaults (OTel, health checks, resilience)
          // Works standalone without AppHost — service discovery is a no-op
          builder.AddServiceDefaults();

          // ... rest of app configuration

          var app = builder.Build();

          // Map Aspire health endpoints in development
          app.MapDefaultEndpoints();
    prevalence: common

  - category: structure
    pattern: "Test project NuGet package set"
    description: >
      The canonical NUnit 4 test project for .NET 10 ASP.NET Core uses a specific
      set of NuGet packages verified from official Aspire templates and Microsoft
      Learn documentation.
    examples:
      - file: "UbiquitiStoreLurker.Tests.csproj (proposed)"
        location: "tests/UbiquitiStoreLurker.Tests/"
        snippet: |
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net10.0</TargetFramework>
              <ImplicitUsings>enable</ImplicitUsings>
              <Nullable>enable</Nullable>
              <IsPackable>false</IsPackable>
              <IsTestProject>true</IsTestProject>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Microsoft.NET.Test.Sdk" Version="17.14.1" />
              <PackageReference Include="NUnit" Version="4.4.0" />
              <PackageReference Include="NUnit.Analyzers" Version="4.10.0" />
              <PackageReference Include="NUnit3TestAdapter" Version="4.6.0" />
              <PackageReference Include="NSubstitute" Version="5.*" />
              <PackageReference Include="Microsoft.AspNetCore.Mvc.Testing" Version="10.0.*" />
              <PackageReference Include="Microsoft.EntityFrameworkCore.Sqlite" Version="10.0.*" />
              <PackageReference Include="coverlet.collector" Version="6.0.4" />
            </ItemGroup>
            <ItemGroup>
              <ProjectReference Include="..\..\src\UbiquitiStoreLurker.Web\UbiquitiStoreLurker.Web.csproj" />
            </ItemGroup>
          </Project>
    prevalence: common

