plan_id: storefront-stock-monitor-opus-20260323
objective: >
  A .NET 10 ASP.NET minimal web app with NUnit 4 tests (sensible coverage,
  not exhaustive) and optional .NET Aspire integration for development.
focus_area: "testing-aspire"
created_at: "2026-03-23"
created_by: "GitHub Copilot (gem-researcher)"
status: completed

tldr: |
  - NUnit 4.4.0 is current (March 2026); classic model assertions deprecated — use `Assert.That()` constraint model exclusively.
  - NUnit3TestAdapter 4.6.0 works with NUnit 4.x; NUnit.Analyzers 4.10.0 enforces constraint-model usage at compile time.
  - NSubstitute 5.x is the preferred mocking library for .NET 10 (no Castle.Core issues unlike Moq 4.x).
  - .NET Aspire 9.2+ (current NuGet: Aspire.Hosting.Testing 13.1.0) provides `DistributedApplicationTestingBuilder` for integration tests.
  - Aspire ServiceDefaults adds OpenTelemetry, health checks (/health, /alive), resilience, and service discovery — usable standalone without AppHost.
  - AppHost project must remain OPTIONAL; production Docker deployment must not depend on Aspire packages.
  - WebApplicationFactory<Program> from Microsoft.AspNetCore.Mvc.Testing is the standard integration testing approach for ASP.NET Core 10.
  - Docker Compose: single `stock-monitor` service, `proxy` network, static IP from 172.18.2.x tier, volume mounts for /data and /logs.

