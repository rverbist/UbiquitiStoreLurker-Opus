      │       └── ClientApp/             # Vue 3 / Vite frontend
      ├── tests/
      │   └── UbiquitiStoreLurker.Tests/
      │       ├── UbiquitiStoreLurker.Tests.csproj
      │       ├── Unit/
      │       │   ├── Parsing/
      │       │   │   └── StockParserTests.cs
      │       │   ├── StateMachine/
      │       │   │   └── StockTransitionTests.cs
      │       │   ├── Notifications/
      │       │   │   └── NotificationDispatcherTests.cs
      │       │   ├── Configuration/
      │       │   │   └── ProductConfigValidationTests.cs
      │       │   └── Models/
      │       │       └── ProductCodeTests.cs
      │       ├── Integration/
      │       │   ├── ApiEndpointTests.cs
      │       │   ├── HealthCheckTests.cs
      │       │   ├── DatabaseMigrationTests.cs
      │       │   └── SignalRHubTests.cs
      │       ├── Fixtures/
      │       │   ├── fixture-instock.html
      │       │   ├── fixture-outofstock.html
      │       │   ├── fixture-preorder.html
      │       │   ├── fixture-malformed.html
      │       │   └── fixture-nopriceinfo.html
      │       └── Helpers/
      │           └── TestWebApplicationFactory.cs
      └── aspire/                        # OPTIONAL — not required for production
          ├── UbiquitiStoreLurker.AppHost/
          │   ├── UbiquitiStoreLurker.AppHost.csproj
          │   └── Program.cs
