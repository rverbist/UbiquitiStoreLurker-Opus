  - id: task-phase-12
    name: "Phase 12: Aspire Integration — Learning Edition"
    description: >
      Optional learning exercise. Production stack unaffected.
      Sub-tasks task-phase-12-a through task-phase-12-n each implement
      one concern independently. All sub-tasks carry status: skipped.
      Activate the phase by changing all task-phase-12-* from skipped to pending.

      DESIGN Q&A (canonical reference — do not remove):

      Q: Does Aspire instrument domain code out of the box?
      A: No. Out of the box you get ASP.NET Core HTTP request spans and HttpClient
         outbound spans only. Domain operations (poll cycle, parsers, state machine,
         hub broadcast) are invisible. Custom instrumentation (sub-task D) adds them.

      Q: Is the SQLiteWeb container empty?
      A: No. Aspire coordinates the file path so the SQLiteWeb sidecar mounts the
         SAME SQLite file as the app. You see live dev data.

      Q: Does "aspire publish" push to the remote host?
      A: No — generates docker-compose.yaml + .env locally in ./aspire-output/.
         The VS Code "Deploy → Proxmox" task (sub-task L) scp + ssh-restarts from there.

      Q: Does Aspire reduce config to manage?
      A: Yes. WithReference(db) injects ConnectionStrings__ubiquitistorelurker-db.
         Secrets become AddParameter(..., secret: true) in user-secrets.
         See sub-task K for the full migration table.

      Q: Can the Aspire Dashboard run in the same container as the app?
      A: No — different base images. Run as a sidecar service in docker-compose.
         The app ships OTLP to it via an internal Docker network (sub-task M).

      Q: Will I have 2 Aspire Dashboards running at once?
      A: Never — the two modes are mutually exclusive:
         - Aspire mode (dotnet run AppHost): AppHost auto-starts Dashboard at
           localhost:15888. Compose is NOT running. Grafana at localhost:3000
           (Aspire-managed local container, dev only).
         - Docker mode (local: docker compose up, remote: Proxmox deploy):
           Standalone Dashboard in compose at localhost:18888 / aspire.ubiquitistorelurker.
           rverbist.io. Grafana at grafana.rverbist.io (existing lab — not a new
           container; Prometheus scrape target already wired in Phase 10).
           AppHost is NOT running.
         The standalone Dashboard (mcr.microsoft.com/dotnet/aspire-dashboard:9.2)
         is the EXACT same binary as what AppHost auto-launches. Zero feature diff.

      Q: Standalone Dashboard — gain or lose functionality vs AppHost dashboard?
      A: Neither. Same binary, same image. You gain: works in Docker mode without
         AppHost. You lose: nothing. No duplication at runtime.
    agent: gem-implementer
