      ClientSideRateLimitHandler emits jittered gaps and blocks on 429 Retry-After;
      PollSchedulerService staggers startup bursts;
      all 7 new unit tests pass; dotnet test suite remains green;
      container rebuilt and redeployed; no 429 logged after 24 h of monitoring.
