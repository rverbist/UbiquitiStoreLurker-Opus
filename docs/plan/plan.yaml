  - id: task-backlog-3
    name: "Aspire Test Secrets: Seed Provider Secrets in AppHostTests"
    description: >
      Aspire.Hosting.Testing Test 1 (AppHost_StartsHealthy) currently passes with
      no secrets set — this is correct because all 5 notification providers are
      disabled by default in NotificationConfig (SQLite AppSettings). However, the
      test exercises zero notification code paths, meaning provider DI registration
