  - id: task-backlog-1
    name: "Readiness Health Endpoint: /api/health/ready"
    description: >
      Currently the app exposes only /api/health/live (liveness probe: always 200
      if the process is running). AppHost's .WithHttpHealthCheck("/api/health/ready")
      cannot be activated because /ready does not exist, so Aspire uses the liveness
      path as a poor substitute.

      Implement a true readiness probe at GET /api/health/ready that verifies the
      app is fully initialised and able to serve traffic:

      Checks to include (all must pass for 200 OK — any failure → 503):
        1. Database reachable: execute a lightweight EF Core query
           (e.g. context.AppSettings.AnyAsync()) — confirms SQLite file is mounted,
           migrations applied, WAL mode active.
        2. Poller initialised: PollingCoordinatorService has completed its first
           scan loop (expose via a simple bool flag or IReadinessIndicator interface).
        3. Optional (if SignalR client count is available): hub reachable.

      Implementation:
        - Register checks in Program.cs using builder.Services.AddHealthChecks():
            services.AddHealthChecks()
              .AddCheck<DatabaseReadinessCheck>("database", tags: ["ready"])
              .AddCheck<PollerReadinessCheck>("poller", tags: ["ready"])
        - Map endpoints:
            app.MapHealthChecks("/api/health/live",
              new HealthCheckOptions { Predicate = _ => false });   // process alive only
            app.MapHealthChecks("/api/health/ready",
              new HealthCheckOptions { Predicate = c => c.Tags.Contains("ready") });
        - Update AppHost Program.cs:
            .WithHttpHealthCheck("/api/health/live")    // keep existing liveness
            .WithHttpProbe(ProbeType.Readiness, "/api/health/ready")   // NEW
        - Update docker-compose.yml healthcheck to use /api/health/ready.
        - Update README "Development Modes" access URLs section.

      NUnit tests:
        - HealthEndpoint_Live_Returns200_WhenProcessRunning: existing smoke test to verify
        - HealthEndpoint_Ready_Returns200_WhenDatabaseAccessible: WebApplicationFactory
          with real in-memory/file SQLite — assert 200 OK.
        - HealthEndpoint_Ready_Returns503_WhenDatabaseUnavailable: configure invalid
          connection string — assert 503 Service Unavailable.

    agent: gem-implementer
    status: completed
    completed: "2026-03-24"
    dependencies:
      - task-phase-12-b
    deliverable: >
      GET /api/health/ready returns 200 when DB + poller are ready, 503 otherwise;
      AppHost .WithHttpHealthCheck("/api/health/ready") wired; docker-compose healthcheck updated;
      3 NUnit tests pass (69/69 total).
    requires_review: false
    tech_stack:
      - ".NET 10"
      - "Microsoft.Extensions.Diagnostics.HealthChecks"
      - ".NET Aspire 9.2+"
      - "NUnit 4.4.0"
    estimated_lines: 150
    test_coverage: "3 NUnit tests: live 200, ready 200 (DB ok), ready 503 (DB unavailable)"

  - id: task-backlog-2
    name: "OTLP Push to Lab OpenTelemetry Collector"
    description: >
      Currently observability is pull-only: Prometheus scrapes /api/metrics every
      15 s. Adding an OTel Collector sidecar enables push-based OTLP telemetry
      (traces + metrics) to flow into the existing lab Prometheus and Grafana
      without changing Traefik routing.

      Architecture:
        UbiquitiStoreLurker app
          → OTLP gRPC (push)
          → otel/opentelemetry-collector-contrib sidecar
          → Prometheus remote-write → existing lab Prometheus (172.18.1.1)
          → Grafana (172.18.1.2) — no dashboard changes needed

        Aspire Dashboard (standalone, 172.18.2.5) continues to receive OTLP from
        the app directly on port 18889 (existing wiring from task-phase-12-k).
        The Collector is an ADDITIONAL consumer — not a replacement.

      Steps:
        1. Add otel-collector service to src/docker-compose.yml:
             otel-collector:
               image: otel/opentelemetry-collector-contrib:latest
               container_name: ubiquitistorelurker-otel-collector
               restart: unless-stopped
               networks:
                 proxy:
                   ipv4_address: 172.18.2.6    # next free IP in apps tier
               volumes:
                 - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
               command: ["--config=/etc/otelcol-contrib/config.yaml"]

        2. Author src/otel-collector.yaml:
             receivers:
               otlp:
                 protocols:
                   grpc:
                     endpoint: 0.0.0.0:4317
             exporters:
               prometheusremotewrite:
                 endpoint: http://172.18.1.1:9090/api/v1/write
               logging:
                 loglevel: warn
             service:
               pipelines:
                 traces:
                   receivers: [otlp]
                   exporters: [logging]
                 metrics:
                   receivers: [otlp]
                   exporters: [prometheusremotewrite, logging]

        3. Add second OTLP target to ubiquitistorelurker service environment:
             - OTEL_EXPORTER_OTLP_ENDPOINT=http://ubiquitistorelurker-otel-collector:4317
           Note: the app already pushes to aspire-dashboard:18889 via the existing
           env var. Either fan-out via OTel SDK multi-exporter or point to Collector
           and have Collector forward to both. Prefer Collector fan-out to keep
           app config simple (single endpoint).

        4. Verify Prometheus remote-write is enabled on the lab Prometheus instance
           (/opt/docker/infra/monitoring/docker-compose.yml) — add --web.enable-remote-write-receiver
           flag if not already present.

        5. Validate end-to-end:
             a. docker compose up → otel-collector healthy
             b. Trigger a poll cycle
             c. Prometheus UI (prometheus.rverbist.io): query ubiquitistorelurker_checks_total
                shows data from BOTH scrape AND remote-write
             d. Aspire Dashboard (aspire.ubiquitistorelurker.rverbist.io): traces still visible

        6. Document in README: "Observability — Pull vs Push" section explaining
           the dual-path architecture.

    agent: gem-devops
    status: completed
    completed: "2026-03-24"
    dependencies:
      - task-phase-12-k
    deliverable: >
      otel-collector service at 172.18.2.6 in docker-compose; otel-collector.yaml
      authored (receivers: OTLP gRPC; exporters: prometheusremotewrite + otlp/aspire + debug);
      OTEL_EXPORTER_OTLP_ENDPOINT rerouted from aspire-dashboard:18889 to Collector on 4317;
      Collector fans out metrics to Prometheus remote-write and traces to Aspire Dashboard;
      lab Prometheus --web.enable-remote-write-receiver flag added;
      README documents dual-path architecture.
    requires_review: false
    tech_stack:
      - "otel/opentelemetry-collector-contrib"
      - "Prometheus remote-write"
      - "Docker Compose"
      - ".NET 10 OpenTelemetry SDK"
