objective: >
  Build a .NET 10 ASP.NET Minimal API + Vue 3 web application that monitors
  Ubiquiti EU Store product pages for stock availability changes, stores history
  in SQLite via EF Core 10 (WAL mode), sends notifications through 5 providers
  (Browser Push/VAPID, Email/MailKit, SMS/Twilio, Microsoft Teams, Discord),
  streams real-time updates via SignalR, and displays a celebration popup with
  GSAP animations and canvas-confetti when products come in stock. Deployed as a
  single Docker container (Alpine multi-stage, non-root UID 1654) behind Traefik
  at ubiquitistorelurker.rverbist.io with static IP 172.18.2.4 in the apps tier.

tech_stack:
  backend:
    - ".NET 10 LTS (ASP.NET Core 10 Minimal API)"
    - "EF Core 10 + SQLite (WAL mode)"
    - "SignalR (built-in)"
    - "Serilog CLEF (5 packages)"
    - "prometheus-net 8.2.1"
    - "Microsoft.Extensions.Http.Resilience 9.5.0"
    - "AngleSharp 1.3.0"
    - "MailKit 4.15.1, Twilio 7.14.3, Lib.Net.Http.WebPush 3.3.1"
  frontend:
    - "Vue 3.5.x + Vite 6.x + TypeScript"
    - "GSAP 3.12+, canvas-confetti ~1.9"
    - "@microsoft/signalr ^8, Vue Router 4"
  testing:
    - "NUnit 4.4.0, NSubstitute 5.x"
    - "Microsoft.AspNetCore.Mvc.Testing 10.0.*"
    - "coverlet.collector 6.*"
  infrastructure:
    - "Docker Alpine multi-stage (sdk:10.0-alpine / aspnet:10.0-alpine)"
    - "Traefik reverse proxy, static IP 172.18.2.4"
    - "Prometheus + Grafana (existing lab stack)"
    - ".NET Aspire 9.2+ ServiceDefaults (dev-only)"

deployment:
  container_name: ubiquitistorelurker
  network: proxy
  ip: "172.18.2.4"
  hostname: ubiquitistorelurker.rverbist.io
  data_volume: /devpool/docker-volumes/apps/ubiquitistorelurker/data
  log_volume: /devpool/docker-volumes/apps/ubiquitistorelurker/logs
  compose_path: /opt/docker/apps/ubiquitistorelurker/docker-compose.yml

