  # =============================================================================
  # POST-DELIVERY DISCOVERY SESSION — 2026-03-24
  # =============================================================================
  # During a live review session the following was discovered:
  #
  # 1. Logs reviewed: container healthy, 0 restarts, clean since 2026-03-23T22:36:14Z.
  #    8 startup crashes at first boot were a one-time SQLite volume-creation race
  #    (self-resolved by restart policy). One 405 on SignalR negotiate (stale browser tab).
  #
  # 2. Products added via API using real Ubiquiti EU store URLs:
  #      out-of-stock: https://eu.store.ui.com/eu/en/category/network-storage/products/unas-pro-4
  #      in-stock:     https://eu.store.ui.com/eu/en/category/network-storage/products/unas-pro-8
  #
  # 3. After first poll cycle: both products remained in state=0 (Unknown).
  #    Log showed: "All parsers returned Indeterminate — no stock state detected"
  #    with HTTP 429 on the second product (both fired simultaneously → rate limited).
  #
  # 4. Root cause analysis:
  #    a. Synthetic fixtures: All 7 fixture HTML files were hand-crafted minimal stubs,
  #       not captured from the real store. The plan called for "real Ubiquiti HTML
  #       fixture files" but gem-implementer produced synthetic equivalents.
  #    b. Real page structure confirmed by direct fetch: JSON-LD IS present on real
  #       pages as expected, with correct schema.org availability values. The approach
  #       was architecturally sound but untested against reality.
  #    c. The Indeterminate result's exact cause is unconfirmed — AngleSharp CSS
  #       selector behaviour vs. the real page's script tag attributes
  #       (id="product-jsonld" data-next-head="") could differ from synthetic fixtures.
  #       Also: 429 on second product means only one product was polled per cycle.
  #    d. No git commits were made during development — all 14 phases were committed
  #       as a single unit on 2026-03-24 (commit 9620bfc).
  #
  # 5. Decision: halt code changes, update plan with remediation tasks below.
  # =============================================================================

  - id: task-phase-3-discovery
    name: "Phase 3 Re-discovery: Capture Real Ubiquiti Store Fixtures via Playwright"
    description: >
      The original Phase 3 parser implementation used synthetic HTML fixtures that
      did not accurately represent the real Ubiquiti EU store page structure. This
      task captures ground-truth fixtures from the real store and validates all
      parsers against them before any code changes are made.

      Steps:
      1. Use Playwright (Node.js, headless Chromium) to fetch and save full rendered
         HTML snapshots of both confirmed URLs:
           - UNAS Pro 4 (out-of-stock): https://eu.store.ui.com/eu/en/category/network-storage/products/unas-pro-4
           - UNAS Pro 8 (in-stock):     https://eu.store.ui.com/eu/en/category/network-storage/products/unas-pro-8
         Save as: tests/UbiquitiStoreLurker.Tests/Fixtures/real-unas-pro-4-outofstock.html
                  tests/UbiquitiStoreLurker.Tests/Fixtures/real-unas-pro-8-instock.html
         These are the authoritative fixtures; do NOT simplify or edit them.

      2. Capture HAR file alongside each snapshot to document all network requests,
         response headers (Content-Encoding, Vary, CF-Cache-Status, etc.), and status
         codes. Save to: tests/UbiquitiStoreLurker.Tests/Fixtures/har/

      3. Using the captured HTML, manually verify the following in the fixture:
         a. JSON-LD block presence: script[type="application/ld+json"] — note all
            attributes (id, data-next-head, etc.)
         b. Exact "availability" value in the JSON-LD offers object
         c. Button element structure (class names are Styled Components hashes —
            confirm the ButtonStateParser will correctly return Indeterminate for these)
         d. Any text nodes matching stock-related patterns ("Sold Out", "Add to Cart",
            "Notify Me", "In Stock") that TextContentParser could use

