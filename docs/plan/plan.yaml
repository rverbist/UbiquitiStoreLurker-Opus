  # =============================================================================
  # POST-DISCOVERY HTTP HARDENING SESSION — 2026-03-24
  # =============================================================================
  # Discovery session (task-phase-3-discovery) revealed three compounding issues
  # that must be fixed before parser re-implementation is meaningful:
  #
  # 1. User-Agent is trivially identifiable as a bot:
  #    Current: "UbiquitiStoreLurker/1.0 (+https://github.com/rverbist/ubiquitistorelurker)"
  #    Required: indistinguishable from Chrome 124 on Windows 10
  #
  # 2. No cookie session — the Ubiquiti EU store expects three cookies to be
  #    present before serving product content correctly:
  #      curr_language=en   (not httponly, secure, lax samesite)
  #      curr_store=eu      (not httponly, secure, lax samesite)
  #      store_modal_shown=true (not httponly, secure, strict samesite)
  #    Without these, the store may redirect or serve geo-modal HTML instead
  #    of the product page, causing parser to receive unexpected content.
  #
  # 3. Startup burst: PollSchedulerService enqueues ALL due products simultaneously
  #    on first boot. With default 5 s token bucket, two products are enqueued
  #    at t=0 and t=5 s — the second fires well within the store's rate limit
  #    window, causing 429. The ClientSideRateLimitHandler rate-limits individual
  #    requests but does not add jitter or stagger startup.
  # =============================================================================

  - id: task-phase-http-hardening
    name: "HTTP Client Hardening: Browser Fingerprint + Cookie Session + Rate Limit Safety"
    description: >
      Replace the existing thin UserAgentHandler and ClientSideRateLimitHandler with
      hardened equivalents that make the poller indistinguishable from a real Chrome
      browser session. Three sub-areas:

      === A. Browser Fingerprint (replaces UserAgentHandler) ===

      Create Http/BrowserFingerprintHandler.cs:
      - User-Agent: realistic Chrome 124 string by default, configurable via
        PollOptions.UserAgent (always falls back to Chrome UA if blank or "UbiquitiStoreLurker/*").
        Default: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
        (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
      - Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,
        image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7"
      - Accept-Language: "en-US,en;q=0.9"
      - Accept-Encoding: "gzip, deflate, br, zstd"  (HttpClient decompresses automatically)
      - Cache-Control: "max-age=0"
      - Upgrade-Insecure-Requests: "1"
      - Sec-Fetch-Dest: "document"
      - Sec-Fetch-Mode: "navigate"
      - Sec-Fetch-Site: "none"   (direct navigation)
      - Sec-Fetch-User: "?1"
      - DNT: "1"
      Remove UserAgentHandler.cs (replaced entirely).
      Update Program.cs to register BrowserFingerprintHandler.
      Update PollOptions: rename UserAgent clarify it is the full UA string.

      === B. Cookie Session Management ===

      The Ubiquiti EU store requires three cookies present in every product-page
      request. Without them the server may serve a geo-redirect or consent page
      instead of the product page (breaking all parsers).

      Create Http/UbiquitiCookieHandler.cs (DelegatingHandler):
      - Seed the following cookies for domain eu.store.ui.com on first use:
          curr_language=en    (Secure; SameSite=Lax)
          curr_store=eu       (Secure; SameSite=Lax)
          store_modal_shown=true  (Secure; SameSite=Strict)
      - Back the handler with a shared CookieContainer stored as a singleton.
        All requests to the store share this container so server-set cookies
        (e.g., eu_has_ui_care=true, session tokens) are automatically captured
        and replayed on subsequent requests.
      - Persist the cookie container to SQLite as a serialized JSON blob in
        AppSettings (key: "HttpCookieSession") after each request that modifies
        the jar. Deserialize and reload on startup from the same key.
      - If the persisted blob is older than 24 h, discard and re-seed from scratch
        (cookies have short max-age; re-seeding is safe).
      - Note: HttpClientHandler must be configured with UseCookies=true and the
        shared CookieContainer; the default AddHttpClient pipeline creates a new
        handler per client — use a singleton HttpClientHandler registered manually
        and passed to IHttpClientFactory via PrimaryHttpMessageHandler.

      === C. Rate Limit Safety — never trigger a 429 ===

      The current implementation has two gaps:
      (i)  11 s replenishment on 5 s token bucket is borderline; real browsers do
           not reload pages faster than ~10-15 s per navigation.
      (ii) PollSchedulerService enqueues all due products at once on first boot
           (startup burst), bypassing the intent of per-product intervals.

      Changes required:
      1. Increase default MinRequestGapMs in PollOptions to 12000 ms (12 s).
         Add ±30% random jitter per request: actual gap is random(8400..15600 ms).
         Implement in ClientSideRateLimitHandler using a SemaphoreSlim + async
         Task.Delay(jitteredMs) pattern instead of TokenBucketRateLimiter (simpler
         and allows jitter). Keep the existing TokenBucketRateLimiter for the
         circuit-breaker fallback.
      2. In PollSchedulerService, stagger initial first-poll scheduling: when a
         product has never been polled (NextPollDueAtUtc == MinValue or null),
         assign NextPollDueAtUtc = now + (productIndex × MinRequestGapMs) so that
         products are spaced apart from boot, not all due at t=0.
      3. If a 429 response is received despite the client-side limiter (server
         returned Retry-After header), ClientSideRateLimitHandler must:
           a. Extract Retry-After value (seconds or HTTP date).
           b. Block ALL further requests for that duration (not just the current one)
              by acquiring a write-lock on a shared SemaphoreSlim.
           c. Log at Warning level with Retry-After value.
           d. Increment Prometheus counter: rate_limit_server_429_total.
         This is a last-resort guard — normal operation must never reach 429.
      4. Add Prometheus gauge: poll_request_gap_ms (last observed inter-request gap)
         for visibility.

      === D. Tests ===

      Unit tests (no network required):
      - BrowserFingerprintHandler_SetsUserAgentHeader: verify Chrome UA is set
      - BrowserFingerprintHandler_SetsAllRequiredBrowserHeaders: verify Accept,
        Accept-Language, Sec-Fetch-Dest, Sec-Fetch-Mode, Sec-Fetch-Site all present
      - UbiquitiCookieHandler_SeedsThreeRequiredCookies: new request to eu.store.ui.com
        must include curr_language, curr_store, store_modal_shown cookies
      - UbiquitiCookieHandler_PersistsServerSetCookies: mock response sets a new
        cookie; verify CookieContainer reflects it after the request
      - UbiquitiCookieHandler_ReloadsPersistedCookiesOnStartup: seed AppSettings with
        a JSON blob; verify handler picks up the cookies without a network call
      - ClientSideRateLimitHandler_RespectsJitteredGap: two consecutive requests;
        verify elapsed time between them ≥ MinRequestGapMs × 0.7
      - ClientSideRateLimitHandler_BlocksAllRequestsOn429WithRetryAfter: mock returns
        429 + Retry-After: 30; a second request issued immediately must wait ≥ 30 s
        (use ISystemClock / TimeProvider mock to avoid real delay in tests)

    agent: gem-implementer
    dependencies:
      - task-phase-3-discovery
    deliverable: >
