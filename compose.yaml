services:
  UnifiStoreWatcher:
    container_name: UnifiStoreWatcher
    image: UnifiStoreWatcher:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
      - .env.Production
    volumes:
      - /opt/docker/apps/UnifiStoreWatcher/data:/data
      - /opt/docker/apps/UnifiStoreWatcher/logs:/logs
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.UnifiStoreWatcher.rule=Host(`${UNIFISTOREWATCHER_TRAEFIK_HOST}`)
      - traefik.http.routers.UnifiStoreWatcher.entrypoints=websecure
      - traefik.http.routers.UnifiStoreWatcher.tls=true
      - traefik.http.services.UnifiStoreWatcher.loadbalancer.server.port=8080

networks:
  proxy:
    external: true
